<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative;display:flex;flex-direction:column;height:680px}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between;flex-shrink:0}
.topbar{background:#1A5D1A;padding:10px 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:#fff;flex:1}

/* 필터바 */
.filterbar{padding:8px 0 8px 14px;border-bottom:0.5px solid #f0f0f0;display:flex;flex-direction:column;gap:7px;flex-shrink:0;overflow:hidden}
.filter-label{font-size:9px;font-weight:700;color:#bbb;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.chip-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;padding-right:20px;cursor:grab}
.chip-row::-webkit-scrollbar{display:none}
.cat-wrap{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;padding-right:20px;cursor:grab}
.cat-wrap::-webkit-scrollbar{display:none}
.sq-chip{flex-shrink:0;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555;white-space:nowrap;transition:.12s;user-select:none}
.sq-chip.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A}
.sq-chip-all{flex-shrink:0;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid #1A5D1A;background:#fff;color:#1A5D1A;white-space:nowrap;transition:.12s;user-select:none}
.sq-chip-all.on{background:#1A5D1A;color:#fff}
.cc-visa.on{background:#1a1f71;border-color:#1a1f71}
.cc-master.on{background:#eb001b;border-color:#eb001b}
.cc-jcb.on{background:#007b40;border-color:#007b40}
.cc-amex.on{background:#007bc1;border-color:#007bc1}
.cc-tlog.on{background:#FF6B00;border-color:#FF6B00}
.cc-twallet.on{background:#FFD600;border-color:#FFD600;color:#333}
.cc-union.on{background:#e21836;border-color:#e21836}

/* 검색 + 정렬 바 */
.search-sort-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:.5px solid #f0f0f0;flex-shrink:0}
.search-box{flex:1;display:flex;align-items:center;background:#f5f5f5;border:1.5px solid #e0e0e0;border-radius:20px;padding:6px 10px;gap:6px;transition:.15s}
.search-box:focus-within{border-color:#1A5D1A;background:#fff}
.search-input{flex:1;border:none;background:transparent;font-size:12px;color:#333;outline:none;font-family:inherit}
.search-input::placeholder{color:#bbb}
.search-icon-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;flex-shrink:0}
.search-icon-btn svg{width:14px;height:14px;stroke:#999;fill:none;stroke-width:2;stroke-linecap:round}
.sort-btn{flex-shrink:0;font-size:11px;color:#1A5D1A;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;white-space:nowrap}

/* 매장 수 */
.count-bar{padding:6px 14px;font-size:11px;color:#999;flex-shrink:0}

/* 매장 리스트 */
.store-list{flex:1;overflow-y:auto}
.store-list::-webkit-scrollbar{display:none}
.store-item{display:flex;gap:10px;padding:10px 14px;border-bottom:.5px solid #f5f5f5;cursor:pointer;transition:.12s;align-items:flex-start}
.store-item:hover{background:#fafafa}
.store-item:last-child{border-bottom:none}
.store-thumb{width:62px;height:62px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.store-thumb img{width:100%;height:100%;object-fit:cover}
.store-info{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-meta{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.store-cat{font-size:10px;color:#999}
.store-time{font-size:10px;color:#bbb}
.store-dist{font-size:10px;color:#1A5D1A;font-weight:600}
.store-cards{display:flex;gap:4px;flex-wrap:nowrap;align-items:center;overflow-x:auto;scrollbar-width:none}
.store-cards::-webkit-scrollbar{display:none}
.cpill{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600;color:#fff;white-space:nowrap;flex-shrink:0}
.store-zzim{flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;align-self:center}
.store-zzim svg{width:16px;height:16px;fill:none;stroke:#ccc;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.store-zzim.on svg{fill:#e53935;stroke:#e53935}

/* 빈 상태 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;text-align:center}
.empty-emoji{font-size:36px;margin-bottom:12px}
.empty-txt{font-size:13px;color:#bbb}

/* 바텀시트 */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:20;display:none;border-radius:26px}
.sheet-overlay.open{display:block}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:21;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:55%}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:#e0e0e0;margin:10px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:.5px solid #f0f0f0}
.sheet-title{font-size:13px;font-weight:700}
.sheet-reset{font-size:11px;color:#999;cursor:pointer;padding:2px 6px;border:.5px solid #ddd;border-radius:4px;background:none;font-family:inherit}
.sheet-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px 18px;overflow-y:auto}

.sheet-chip.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A}
.sheet-done{margin:0 14px 14px;padding:10px;border-radius:8px;background:#1A5D1A;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;width:calc(100% - 28px);font-family:inherit}
.sort-item{padding:13px 16px;font-size:13px;color:#333;border-bottom:.5px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.sort-item:last-child{border-bottom:none}
.sort-item.on{color:#1A5D1A;font-weight:700}
.sort-check{font-size:14px;color:#1A5D1A;display:none}
.sort-item.on .sort-check{display:block}

/* 하단 네비 */
.bnav{display:flex;border-top:0.5px solid #eee;background:#fff;padding:8px 0 10px;flex-shrink:0}
.ni{flex:1;text-align:center;font-size:9px;color:#999;cursor:pointer;padding:3px 0;display:flex;flex-direction:column;align-items:center;gap:2px}

.dp-handle{width:36px;height:4px;border-radius:2px;background:#e0e0e0;margin:10px auto 0;flex-shrink:0}

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAf6YhFy83E7dvy9OL08WvYdnH8qzs58o4&libraries=places&v=beta&language=ko"></script>

<script>
function calcIsOpenSlide(hours, todayIdx) {
  try {
    var todayHours = (hours[todayIdx] || '').replace(/^[^:]+:\s*/, '').trim();
    if (!todayHours || todayHours.includes('휴무') || todayHours.toLowerCase().includes('closed')) return false;
    if (todayHours.includes('24시간')) return true;
    var parts = todayHours.split('~');
    if (parts.length < 2) return null;
    function parseTime(s) {
      s = s.trim();
      var isPM = s.includes('오후') || s.includes('PM');
      var isAM = s.includes('오전') || s.includes('AM');
      var m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return null;
      var h = parseInt(m[1]), min = parseInt(m[2]);
      if (isPM && h < 12) h += 12;
      if (isAM && h === 12) h = 0;
      return h * 60 + min;
    }
    var now = new Date();
    var nowMins = now.getHours() * 60 + now.getMinutes();
    var openMins = parseTime(parts[0]);
    var closeMins = parseTime(parts[1]);
    if (openMins === null || closeMins === null) return null;
    if (closeMins <= openMins) closeMins += 24 * 60;
    return nowMins >= openMins && nowMins < closeMins;
  } catch(e) { return null; }
}

function toggleDpZzim(){var btn=document.getElementById('dp-zzim');if(btn)btn.classList.toggle('on');}
function goToDetail(){var id=window._currentStoreId;if(id)window.location.href='heka_store_detail.html?id='+id;else window.location.href='heka_store_detail.html';}
function toggleHours(){var el=document.getElementById('hours-full');var arrow=document.getElementById('hours-arrow');if(!el)return;window._hoursOpen=!window._hoursOpen;el.style.display=window._hoursOpen?'block':'none';arrow.textContent=window._hoursOpen?'전체 ▲':'전체 ▼';}
</script>

window._fetchStores = async function() {
  try {
    const q = query(collection(db,'stores'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    window.allStores = [];
    snap.forEach(function(d){ window.allStores.push(Object.assign({id:d.id},d.data())); });
    window.doFilter();
  } catch(e) {
    console.error(e);
    document.getElementById('count-bar').textContent = '불러오기 실패';
  }
};

window.openFirebaseDetail = async function(store) {
  window._currentStoreId = store.id || null;

  document.getElementById('dp-name').textContent = store.name;
  document.getElementById('dp-cat').textContent = store.category || '';
  document.getElementById('dp-scroll').innerHTML = '<div style="padding:20px;text-align:center;color:#bbb;font-size:12px">정보 불러오는 중...</div>';
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('dp-scroll').scrollTop = 0;

  var cards = (store.payOk || []).filter(function(c){ return c !== '카드가능' && c !== '현금가능' && c !== '모르겠어요'; });
  var pills = cards.map(function(c){ return '<span class="dpill" style="background:'+cardColor(c)+';color:#fff">'+c+'</span>'; }).join('');
  var noCards = (store.payNo || []).filter(function(c){ return c !== '모르겠어요'; });
  var noPills = noCards.map(function(c){ return '<span class="dpill" style="background:#fff0f0;color:#dc2626;border:1px solid #fecaca;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600">'+c+'</span>'; }).join('');

  var placesInfo = { hours: null, phone: null, isOpen: null };
  try {
    if (typeof google !== 'undefined' && store.lat && store.lng) {
      const { Place } = await google.maps.importLibrary('places');
      const { places } = await Place.searchByText({
        textQuery: store.name + ' ' + (store.address || ''),
        fields: ['regularOpeningHours','nationalPhoneNumber'],
        maxResultCount: 1,
      });
      if (places && places[0]) {
        var p = places[0];
        placesInfo.phone = p.nationalPhoneNumber || null;
        if (p.regularOpeningHours) {
          placesInfo.hours = p.regularOpeningHours.weekdayDescriptions || null;
          try { placesInfo.isOpen = p.regularOpeningHours.isOpen(); } catch(e) { placesInfo.isOpen = null; }
        }
      }
    }
  } catch(e) { console.log('Places 오류:', e); }

  var mapHtml = '';
  if (store.lat && store.lng) {
    var mapUrl = 'https://www.google.com/maps/search/?api=1&query='+store.lat+','+store.lng;
    mapHtml = '<div style="width:100%;height:110px;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:12px;cursor:pointer" onclick="window.open(\''+mapUrl+'\',\'_blank\')">'
      + '<div id="dp-gmap" style="width:100%;height:100%"></div>'
      + '</div>';
  }

  var hoursHtml = '';
  if (placesInfo.hours && placesInfo.hours.length) {
    var dayNames = ['월','화','수','목','금','토','일'];
    var today = new Date().getDay();
    var todayGIdx = today === 0 ? 6 : today - 1;
    var todayTime = (placesInfo.hours[todayGIdx] || '').replace(/^[^:]+:\s*/, '');
    var todayDayName = dayNames[todayGIdx];
    var isOpenCalc = calcIsOpenSlide(placesInfo.hours, todayGIdx);
    var openBadge = isOpenCalc === true
      ? '<span style="color:#1A5D1A;font-size:11px;font-weight:700;margin-right:5px">영업중</span>'
      : isOpenCalc === false
      ? '<span style="color:#ff3b30;font-size:11px;font-weight:700;margin-right:5px">영업종료</span>' : '';
    hoursHtml = '<div style="display:flex;align-items:center;margin:8px 0 4px">'+openBadge+'<span style="font-size:12px;color:#111;font-weight:600">'+todayDayName+'요일 '+todayTime+'</span></div>';
  }

  document.getElementById('dp-scroll').innerHTML =
    '<div style="margin-bottom:8px">'
    +'<div style="font-size:10px;font-weight:700;color:#2563eb;margin-bottom:5px">결제 가능</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px">'+pills+'</div>'
    +'</div>'
    +(noPills ? '<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#dc2626;margin-bottom:5px">결제 불가</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+noPills+'</div></div>' : '')
    +hoursHtml
    +(store.address ? '<div style="font-size:11px;color:#777;margin-bottom:8px">'+store.address+'</div>' : '')
    +mapHtml;

  if (store.lat && store.lng && typeof google !== 'undefined') {
    setTimeout(function() {
      var el = document.getElementById('dp-gmap');
      if (!el) return;
      var map = new google.maps.Map(el, { center:{lat:store.lat,lng:store.lng}, zoom:16, disableDefaultUI:true, gestureHandling:'none' });
      new google.maps.Marker({ position:{lat:store.lat,lng:store.lng}, map:map, title:store.name });
    }, 150);
  }
};
</script>
<script>
// ── 헬퍼 ──
function cardColor(c){var m={'VISA':'#1a1f71','MASTER':'#eb001b','JCB':'#007b40','AMEX':'#007bc1','트래블로그':'#FF6B00','트래블월렛':'#b8970a','UnionPay':'#e21836'};return m[c]||'#888';}
function catEmoji(c){var m={'식당':'🍽️','카페':'☕','펍':'🍺','패스트푸드':'🍔','이자카야':'🏮','편의점':'🏪','마트':'🛒','호텔':'🏨','입장권':'🎫','전철 티켓':'🚇','버스':'🚌','ATM기':'🏧'};return m[c]||'🏬';}
function catBg(c){var m={'식당':'#FFF0E0','카페':'#FFF8E8','펍':'#F0F8FF','패스트푸드':'#FFF4E8','이자카야':'#FFF0F4','편의점':'#EEF4FF','마트':'#EDFFF4','호텔':'#F4F0FF','입장권':'#FEFEE8','전철 티켓':'#EEF0FF','버스':'#EEFFFA','ATM기':'#FFF0FA'};return m[c]||'#F4F4F8';}
function timeAgo(ts){if(!ts)return'방금 전';var t=ts.toMillis?ts.toMillis():(ts.seconds?ts.seconds*1000:ts),d=Math.floor((Date.now()-t)/60000);if(d<1)return'방금 전';if(d<60)return d+'분 전';if(d<1440)return Math.floor(d/60)+'시간 전';return Math.floor(d/1440)+'일 전';}
function calcDist(a,b,c,d){var R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));}
function distLbl(m){return m<1000?m+'M':(m/1000).toFixed(1)+'km';}

// ── 상태 ──
window.allStores = [];
var userLat=null, userLng=null, sortOrder='distance';
var cardSel=new Set(['all']), catSel=new Set();

// ── 로드 ──
function init(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(p){userLat=p.coords.latitude;userLng=p.coords.longitude;window._fetchStores&&window._fetchStores();},
      function(){window._fetchStores&&window._fetchStores();},
      {timeout:5000}
    );
  } else { window._fetchStores&&window._fetchStores(); }
}

// ── 렌더 ──
var _renderedStores = [];
function renderList(stores){
  _renderedStores = stores;
  var el=document.getElementById('store-list');
  document.getElementById('count-bar').textContent='전체 '+stores.length+'개';
  if(!stores.length){el.innerHTML='<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-txt">해당 조건의 매장이 없어요</div></div>';return;}
  el.innerHTML=stores.map(function(s,idx){
    var cardOrder=['VISA','MASTER','JCB','AMEX','UnionPay','트래블로그','트래블월렛'];
    var cards=(s.payOk||[]).filter(function(c){return c!=='카드가능'&&c!=='현금가능'&&c!=='모르겠어요';});
    cards.sort(function(a,b){var ai=cardOrder.indexOf(a),bi=cardOrder.indexOf(b);ai=ai<0?99:ai;bi=bi<0?99:bi;return ai-bi;});
    var pills=cards.map(function(c){return'<span class="cpill" style="background:'+cardColor(c)+'">'+c+'</span>';}).join('');
    var dist='';
    if(userLat&&userLng&&s.lat&&s.lng){var m=calcDist(userLat,userLng,s.lat,s.lng);dist='<span class="store-dist">'+distLbl(m)+'</span>';}
    var thumb=s.images&&s.images[0]?'<div class="store-thumb"><img src="'+s.images[0]+'" alt=""></div>':'<div class="store-thumb" style="background:'+catBg(s.category)+'">'+catEmoji(s.category)+'</div>';
    return'<div class="store-item" data-idx="'+idx+'" onclick="openStoreByIdx(this)">'+thumb+'<div class="store-info"><div class="store-name">'+s.name+'</div><div class="store-meta"><span class="store-cat">'+(s.category||'')+'</span><span class="store-time"> · '+timeAgo(s.createdAt)+'</span>'+dist+'</div><div class="store-cards">'+pills+'</div></div><button class="store-zzim" onclick="event.stopPropagation();this.classList.toggle(\'on\')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button></div>';
  }).join('');
}
function openStoreByIdx(el){
  var idx=parseInt(el.getAttribute('data-idx'));
  var store=_renderedStores[idx];
  if(store&&window.openFirebaseDetail) window.openFirebaseDetail(store);
}

// ── 한글→로마자 변환 (검색용) ──
var KO_CONSONANTS='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
var KO_VOWELS='ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ';
var ROMAJA_CHO=['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
var ROMAJA_JUNG=['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
var ROMAJA_JONG=['','g','kk','gs','n','nj','nh','d','r','rg','rm','rb','rs','rt','rp','rh','m','b','bs','s','ss','ng','j','ch','k','t','p','h'];

function korToRomaja(str){
  var result='';
  for(var i=0;i<str.length;i++){
    var code=str.charCodeAt(i);
    if(code>=0xAC00&&code<=0xD7A3){
      var idx=code-0xAC00;
      var cho=Math.floor(idx/588);
      var jung=Math.floor((idx%588)/28);
      var jong=idx%28;
      result+=ROMAJA_CHO[cho]+ROMAJA_JUNG[jung]+ROMAJA_JONG[jong];
    } else {
      result+=str[i];
    }
  }
  return result.toLowerCase();
}

// 한글 초성 추출
function getChosung(str){
  var result='';
  for(var i=0;i<str.length;i++){
    var code=str.charCodeAt(i);
    if(code>=0xAC00&&code<=0xD7A3){
      result+=KO_CONSONANTS[Math.floor((code-0xAC00)/588)];
    }
  }
  return result;
}

// 검색 매칭: 한글 입력 → 영어 상호명도 매칭
function searchMatch(name, addr, kw){
  var nameLow=(name||'').toLowerCase();
  var addrLow=(addr||'').toLowerCase();
  // 1) 기본: 이름/주소에 직접 포함
  if(nameLow.indexOf(kw)>-1) return true;
  if(addrLow.indexOf(kw)>-1) return true;
  // 2) 한글 키워드 → 로마자 변환 후 영어 이름과 비교
  var hasKorean=/[가-힣]/.test(kw);
  if(hasKorean){
    var romaja=korToRomaja(kw);
    if(romaja&&nameLow.indexOf(romaja)>-1) return true;
    // 부분 매칭: romaja가 name의 단어 시작부분과 일치하는지
    var words=nameLow.split(/[\s\-_']+/);
    for(var w=0;w<words.length;w++){
      if(words[w].indexOf(romaja)===0) return true;
    }
  }
  // 3) 영어 키워드 → 그대로 이름과 비교 (이미 1에서 처리됨)
  return false;
}

// ── 필터+정렬 ──
function doFilter(){
  var kw=(document.getElementById('search-input-el').value||'').trim().toLowerCase();
  var list=(window.allStores||[]).filter(function(s){
    var cOk=cardSel.has('all')?true:(s.payOk||[]).some(function(c){return cardSel.has(c);});
    var tOk=catSel.size===0?true:catSel.has(s.category);
    var kOk=!kw?true:searchMatch(s.name, s.address, kw);
    return cOk&&tOk&&kOk;
  });
  if(sortOrder==='distance'&&userLat&&userLng) list.sort(function(a,b){return(a.lat&&a.lng?calcDist(userLat,userLng,a.lat,a.lng):99999)-(b.lat&&b.lng?calcDist(userLat,userLng,b.lat,b.lng):99999);});
  else if(sortOrder==='latest') list.sort(function(a,b){return(b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0)-(a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0);});
  else if(sortOrder==='rating') list.sort(function(a,b){return(b.rating||0)-(a.rating||0);});
  renderList(list);
}
window.doFilter = doFilter;

// ── 카드사 필터 ──
function syncCardChips(){document.querySelectorAll('.chip-row .sq-chip').forEach(function(c){var m=(c.getAttribute('onclick')||'').match(/toggleCardMain\(this,'([^']+)'\)/);if(m)c.classList.toggle('on',cardSel.has(m[1])||(cardSel.has('all')&&m[1]==='all'));});}
function syncCardSheet(){document.querySelectorAll('#card-sheet-wrap .sheet-chip').forEach(function(c){var m=(c.getAttribute('onclick')||'').match(/toggleCardChip\(this,'([^']+)'\)/);if(m)c.classList.toggle('on',cardSel.has(m[1]));});}
function toggleCardMain(el,v){if(v==='all'){cardSel.clear();cardSel.add('all');}else{cardSel.delete('all');cardSel.has(v)?cardSel.delete(v):cardSel.add(v);if(!cardSel.size)cardSel.add('all');}syncCardChips();syncCardSheet();doFilter();}
function toggleCardChip(el,v){if(v==='all'){cardSel.clear();cardSel.add('all');}else{cardSel.delete('all');cardSel.has(v)?cardSel.delete(v):cardSel.add(v);if(!cardSel.size)cardSel.add('all');}syncCardSheet();syncCardChips();doFilter();}
function cardReset(){cardSel.clear();cardSel.add('all');syncCardSheet();syncCardChips();doFilter();}
var cardSO=false;
function toggleCardSheet(){cardSO?closeCardSheet():openCardSheet();}
function openCardSheet(){cardSO=true;document.getElementById('card-overlay').classList.add('open');document.getElementById('card-sheet').classList.add('open');document.getElementById('card-all-btn').textContent='모두보기 ▴';}
function closeCardSheet(){cardSO=false;document.getElementById('card-overlay').classList.remove('open');document.getElementById('card-sheet').classList.remove('open');document.getElementById('card-all-btn').textContent='모두보기 ▾';}

// ── 업종 필터 ──
var cats=['식당','카페','펍','패스트푸드','이자카야','편의점','마트','호텔','입장권','전철 티켓','버스','ATM기','기타'];
var catWrap=document.getElementById('cat-wrap'), sw=document.getElementById('sheet-wrap');
cats.forEach(function(l){
  var d=document.createElement('div');d.className='sq-chip';d.textContent=l;d.dataset.l=l;d.onclick=function(){toggleCat(l);};catWrap.appendChild(d);
  var s=document.createElement('div');s.className='sheet-chip';s.textContent=l;s.dataset.l=l;s.onclick=function(){toggleCat(l);};sw.appendChild(s);
});
function toggleCat(l){catSel.has(l)?catSel.delete(l):catSel.add(l);document.getElementById('cat-all-select').classList.toggle('on',catSel.size===0);syncCatChips();doFilter();}
function syncCatChips(){catWrap.querySelectorAll('.sq-chip').forEach(function(c){c.classList.toggle('on',catSel.has(c.dataset.l));});sw.querySelectorAll('.sheet-chip').forEach(function(c){c.classList.toggle('on',catSel.has(c.dataset.l));});}
function catSelectAll(){catSel.clear();syncCatChips();document.getElementById('cat-all-select').classList.add('on');doFilter();}
function catReset(){catSel.clear();syncCatChips();document.getElementById('cat-all-select').classList.add('on');}
var catSO=false;
function toggleCatSheet(){catSO?closeCatSheet():openCatSheet();}
function openCatSheet(){catSO=true;document.getElementById('cat-overlay').classList.add('open');document.getElementById('cat-sheet').classList.add('open');document.getElementById('cat-all-btn').textContent='모두보기 ▴';}
function closeCatSheet(){catSO=false;document.getElementById('cat-overlay').classList.remove('open');document.getElementById('cat-sheet').classList.remove('open');document.getElementById('cat-all-btn').textContent='모두보기 ▾';}

// ── 정렬 ──
function openSortSheet(){document.getElementById('sort-overlay').classList.add('open');document.getElementById('sort-sheet').classList.add('open');}
function closeSortSheet(){document.getElementById('sort-overlay').classList.remove('open');document.getElementById('sort-sheet').classList.remove('open');}
function selectSort(order,label){sortOrder=order;document.getElementById('sort-btn').textContent=label+' ▾';document.querySelectorAll('.sort-item').forEach(function(el){el.classList.remove('on');});document.getElementById('sort-'+order).classList.add('on');closeSortSheet();doFilter();}

// ── PC 드래그 ──
function addDragScroll(el){var dn=false,sx,sl;el.addEventListener('mousedown',function(e){dn=true;sx=e.pageX-el.offsetLeft;sl=el.scrollLeft;el.style.cursor='grabbing';});el.addEventListener('mouseleave',function(){dn=false;el.style.cursor='grab';});el.addEventListener('mouseup',function(){dn=false;el.style.cursor='grab';});el.addEventListener('mousemove',function(e){if(!dn)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx);});}
document.querySelectorAll('.chip-row,.cat-wrap').forEach(addDragScroll);
document.querySelectorAll('.store-cards').forEach(addDragScroll);
var _origRender=renderList;
renderList=function(stores){_origRender(stores);document.querySelectorAll('.store-cards').forEach(addDragScroll);};

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
