<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative;display:flex;flex-direction:column;height:680px}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between;flex-shrink:0}
.topbar{background:#1A5D1A;padding:10px 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:#fff;flex:1}
.topbar-count{font-size:11px;color:rgba(255,255,255,.7)}

/* 필터바 */
.filterbar{padding:8px 0 8px 14px;border-bottom:0.5px solid #f0f0f0;display:flex;flex-direction:column;gap:7px;flex-shrink:0;overflow:hidden}
.filter-label{font-size:9px;font-weight:700;color:#bbb;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.chip-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;padding-right:20px;cursor:grab}
.chip-row::-webkit-scrollbar{display:none}
.cat-wrap{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;padding-right:20px;cursor:grab}
.cat-wrap::-webkit-scrollbar{display:none}
.sq-chip{flex-shrink:0;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555;white-space:nowrap;transition:.12s;user-select:none}
.sq-chip.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A}
.sq-chip-all{flex-shrink:0;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid #1A5D1A;background:#fff;color:#1A5D1A;white-space:nowrap;transition:.12s;user-select:none}
.sq-chip-all.on{background:#1A5D1A;color:#fff}
.cc-visa.on{background:#1a1f71;border-color:#1a1f71}
.cc-master.on{background:#eb001b;border-color:#eb001b}
.cc-jcb.on{background:#007b40;border-color:#007b40}
.cc-amex.on{background:#007bc1;border-color:#007bc1}
.cc-tlog.on{background:#FF6B00;border-color:#FF6B00}
.cc-twallet.on{background:#FFD600;border-color:#FFD600;color:#333}
.cc-union.on{background:#e21836;border-color:#e21836}

/* 정렬 */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:.5px solid #f5f5f5;flex-shrink:0}
.sort-txt{font-size:11px;color:#999}
.sort-btn{font-size:11px;color:#1A5D1A;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}

/* 매장 리스트 */
.store-list{flex:1;overflow-y:auto;padding:8px 0}
.store-list::-webkit-scrollbar{display:none}
.store-item{display:flex;gap:10px;padding:10px 14px;border-bottom:.5px solid #f5f5f5;cursor:pointer;transition:.12s;align-items:flex-start}
.store-item:hover{background:#fafafa}
.store-item:last-child{border-bottom:none}
.store-thumb{width:62px;height:62px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;background:#f0f0f0}
.store-thumb img{width:100%;height:100%;object-fit:cover}
.store-info{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.store-cat{font-size:10px;color:#999}
.store-time{font-size:10px;color:#bbb}
.store-cards{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.cpill{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600;color:#fff;white-space:nowrap}
.store-open{font-size:10px;font-weight:700;color:#1A5D1A}
.store-close{font-size:10px;font-weight:700;color:#ff3b30}
.store-zzim{flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px}
.store-zzim svg{width:16px;height:16px;fill:none;stroke:#ccc;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.store-zzim.on svg{fill:#e53935;stroke:#e53935}

/* 빈 상태 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;text-align:center}
.empty-emoji{font-size:40px;margin-bottom:12px}
.empty-txt{font-size:13px;color:#bbb}

/* 하단 네비 */
.bnav{display:flex;border-top:0.5px solid #eee;background:#fff;padding:8px 0 10px;flex-shrink:0}
.ni{flex:1;text-align:center;font-size:9px;color:#999;cursor:pointer;padding:3px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.ni.on{color:#1A5D1A;font-weight:600}
.ni svg{width:17px;height:17px}
.nplus{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.npbtn{width:36px;height:36px;border-radius:50%;background:#1A5D1A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;border:none;cursor:pointer;margin-bottom:2px;margin-top:-4px}
.nplbl{font-size:9px;color:#1A5D1A;font-weight:600}

/* 바텀시트 */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:20;display:none;border-radius:26px}
.sheet-overlay.open{display:block}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:21;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:55%}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:#e0e0e0;margin:10px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:.5px solid #f0f0f0}
.sheet-title{font-size:13px;font-weight:700}
.sheet-reset{font-size:11px;color:#999;cursor:pointer;padding:2px 6px;border:.5px solid #ddd;border-radius:4px}
.sheet-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px 18px;overflow-y:auto}
.sheet-chip{padding:5px 11px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555;white-space:nowrap;transition:.12s}
.sheet-chip.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A}
.sheet-done{margin:0 14px 14px;padding:10px;border-radius:8px;background:#1A5D1A;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;width:calc(100% - 28px);font-family:inherit}
</style>

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAf6YhFy83E7dvy9OL08WvYdnH8qzs58o4Y&libraries=places&language=ko&v=beta"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmcsC_89TfZUIhgH6hKPaTKLXQn3rRzCo",
  authDomain: "card-store-finder.firebaseapp.com",
  projectId: "card-store-finder",
  storageBucket: "card-store-finder.firebasestorage.app",
  messagingSenderId: "340038449458",
  appId: "1:340038449458:web:14c3327a26d0d2892f3f2b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function cardColor(card) {
  var map = {'VISA':'#1a1f71','MASTER':'#eb001b','JCB':'#007b40','AMEX':'#007bc1','트래블로그':'#FF6B00','트래블월렛':'#b8970a','UnionPay':'#e21836'};
  return map[card] || '#888';
}

function catEmoji(cat) {
  var map = {'식당':'🍽️','카페':'☕','펍':'🍺','패스트푸드':'🍔','이자카야':'🏮','편의점':'🏪','마트':'🛒','호텔':'🏨','입장권':'🎫','전철 티켓':'🚇','버스':'🚌','ATM기':'🏧'};
  return map[cat] || '🏬';
}

function catBg(cat) {
  var map = {'식당':'#FFF0E0','카페':'#FFF8E8','펍':'#F0F8FF','패스트푸드':'#FFF4E8','이자카야':'#FFF0F4','편의점':'#EEF4FF','마트':'#EDFFF4','호텔':'#F4F0FF','입장권':'#FEFEE8','전철 티켓':'#EEF0FF','버스':'#EEFFFA','ATM기':'#FFF0FA'};
  return map[cat] || '#F4F4F8';
}

function timeAgo(ts) {
  if (!ts) return '방금 전';
  var now = Date.now();
  var t = ts.toMillis ? ts.toMillis() : ts;
  var diff = Math.floor((now - t) / 60000);
  if (diff < 1) return '방금 전';
  if (diff < 60) return diff + '분 전';
  if (diff < 1440) return Math.floor(diff/60) + '시간 전';
  return Math.floor(diff/1440) + '일 전';
}

var allStores = [];
var sortOrder = 'latest'; // latest | alpha

async function loadStores() {
  try {
    const q = query(collection(db, 'stores'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allStores = [];
    snap.forEach(doc => allStores.push({ id: doc.id, ...doc.data() }));
    renderList(allStores);
  } catch(e) {
    console.error(e);
  }
}

function renderList(stores) {
  var list = document.getElementById('store-list');
  var countEl = document.getElementById('store-count');
  countEl.textContent = stores.length + '개';

  if (!stores.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-txt">해당 조건의 매장이 없어요</div></div>';
    return;
  }

  list.innerHTML = stores.map(function(store) {
    var cards = (store.payOk || []).filter(function(c){ return c !== '카드가능' && c !== '현금가능' && c !== '모르겠어요'; });
    var pillsHtml = cards.slice(0, 2).map(function(c){
      return '<span class="cpill" style="background:'+cardColor(c)+'">'+c+'</span>';
    }).join('');
    if (cards.length > 2) pillsHtml += '<span style="font-size:9px;color:#aaa;letter-spacing:1px;margin-left:1px">···</span>';

    var thumbHtml = store.images && store.images[0]
      ? '<div class="store-thumb"><img src="'+store.images[0]+'" alt=""/></div>'
      : '<div class="store-thumb" style="background:'+catBg(store.category)+'">'+catEmoji(store.category)+'</div>';

    return '<div class="store-item" onclick="goToDetail(\''+store.id+'\')">'
      + thumbHtml
      + '<div class="store-info">'
      + '<div class="store-name">'+store.name+'</div>'
      + '<div class="store-meta"><span class="store-cat">'+( store.category||'')+'</span><span class="store-time">· '+timeAgo(store.createdAt)+'</span></div>'
      + '<div class="store-cards">'+pillsHtml+'</div>'
      + '</div>'
      + '<button class="store-zzim" onclick="event.stopPropagation();this.classList.toggle(\'on\')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>'
      + '</div>';
  }).join('');
}

window.applyFilters = function() {
  var filtered = allStores.filter(function(store) {
    var cardOk = !window._cardSelected || window._cardSelected.has('all') ? true
      : (store.payOk || []).some(function(c){ return window._cardSelected.has(c) || window._cardSelected.has(c.toLowerCase()); });
    var catOk = !window._selected || window._selected.size === 0 ? true
      : window._selected.has(store.category);
    return cardOk && catOk;
  });
  if (sortOrder === 'alpha') filtered.sort(function(a,b){ return a.name.localeCompare(b.name); });
  renderList(filtered);
};

window.goToDetail = function(id) {
  window.location.href = 'heka_store_detail.html?id=' + id;
};

window.toggleSort = function() {
  sortOrder = sortOrder === 'latest' ? 'alpha' : 'latest';
  document.getElementById('sort-btn').textContent = sortOrder === 'latest' ? '최신순 ▾' : '이름순 ▾';
  window.applyFilters();
};

window.addEventListener('DOMContentLoaded', loadStores);
</script>
</head>
<body>
<div class="phone">
  <div class="sb"><span>9:41</span><span>해카</span><span>●●●</span></div>

  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='heka_home_v5.html'">←</button>
    <span class="topbar-title">내 주변 카드 결제 매장</span>
    <span class="topbar-count" id="store-count"></span>
  </div>

  <!-- 필터바 -->
  <div class="filterbar">
    <div>
      <div class="filter-label">카드사</div>
      <div class="chip-row">
        <div class="sq-chip-all" id="card-all-btn" onclick="toggleCardSheet()">모두보기 ▾</div>
        <div class="sq-chip on" onclick="toggleCardMain(this,'all')">전체</div>
        <div class="sq-chip cc-visa" onclick="toggleCardMain(this,'visa')">VISA</div>
        <div class="sq-chip cc-master" onclick="toggleCardMain(this,'master')">MASTER</div>
        <div class="sq-chip cc-jcb" onclick="toggleCardMain(this,'jcb')">JCB</div>
        <div class="sq-chip cc-amex" onclick="toggleCardMain(this,'amex')">AMEX</div>
        <div class="sq-chip cc-tlog" onclick="toggleCardMain(this,'트래블로그')">트래블로그</div>
        <div class="sq-chip cc-twallet" onclick="toggleCardMain(this,'트래블월렛')">트래블월렛</div>
        <div class="sq-chip cc-union" onclick="toggleCardMain(this,'UnionPay')">UnionPay</div>
      </div>
    </div>
    <div>
      <div class="filter-label">업종</div>
      <div class="cat-wrap" id="cat-wrap">
        <div class="sq-chip-all" id="cat-all-btn" onclick="toggleSheet()">모두보기 ▾</div>
        <div class="sq-chip-all on" id="cat-all-select" onclick="catSelectAll()">전체</div>
      </div>
    </div>
  </div>

  <!-- 정렬 -->
  <div class="sort-bar">
    <span class="sort-txt">전체 매장</span>
    <button class="sort-btn" id="sort-btn" onclick="toggleSort()">최신순 ▾</button>
  </div>

  <!-- 매장 목록 -->
  <div class="store-list" id="store-list">
    <div class="empty-state"><div class="empty-emoji">⏳</div><div class="empty-txt">불러오는 중...</div></div>
  </div>

  <!-- 카드사 바텀시트 -->
  <div class="sheet-overlay" id="card-overlay" onclick="closeCardSheet()"></div>
  <div class="bottom-sheet" id="card-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title">카드사 선택</span>
      <span class="sheet-reset" onclick="cardReset()">초기화</span>
    </div>
    <div class="sheet-wrap" id="card-sheet-wrap">
      <div class="sheet-chip on" onclick="toggleCardChip(this,'all')">전체</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'visa')">VISA</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'master')">MASTER</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'jcb')">JCB</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'amex')">AMEX</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'트래블로그')">트래블로그</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'트래블월렛')">트래블월렛</div>
      <div class="sheet-chip" onclick="toggleCardChip(this,'UnionPay')">UnionPay</div>
    </div>
    <button class="sheet-done" onclick="closeCardSheet()">선택 완료</button>
  </div>

  <!-- 업종 바텀시트 -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="bottom-sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title">업종 선택</span>
      <span class="sheet-reset" onclick="resetCats()">초기화</span>
    </div>
    <div class="sheet-wrap" id="sheet-wrap"></div>
    <button class="sheet-done" onclick="closeSheet()">선택 완료</button>
  </div>

  <!-- 하단 네비 -->
  <div class="bnav">
    <div class="ni on" onclick="window.location.href='heka_home_v5.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#1A5D1A"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H14v-6h-4v6H4a1 1 0 01-1-1V9.5z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>홈</div>
    <div class="ni" onclick="window.location.href='heka_yeohaengtok_v2.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>여행톡</div>
    <div class="nplus" onclick="window.location.href='heka_register.html'"><button class="npbtn">+</button><span class="nplbl">등록</span></div>
    <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><circle cx="11" cy="11" r="7" stroke-width="1.6"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-width="1.6" stroke-linecap="round"/></svg>검색</div>
    <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke-width="1.6"/></svg>마이페이지</div>
  </div>
</div>

<script>
var cardSelected = new Set(['all']);
window._cardSelected = cardSelected;

function syncCardChips(){ document.querySelectorAll('.chip-row .sq-chip').forEach(function(c){ var m=(c.getAttribute('onclick')||'').match(/toggleCardMain\(this,'([^']+)'\)/); if(m) c.classList.toggle('on', cardSelected.has(m[1])||(cardSelected.has('all')&&m[1]==='all')); }); }
function syncCardSheet(){ document.querySelectorAll('#card-sheet-wrap .sheet-chip').forEach(function(c){ var m=(c.getAttribute('onclick')||'').match(/toggleCardChip\(this,'([^']+)'\)/); if(m) c.classList.toggle('on', cardSelected.has(m[1])); }); }
function toggleCardMain(el,card){ if(card==='all'){cardSelected.clear();cardSelected.add('all');}else{cardSelected.delete('all');cardSelected.has(card)?cardSelected.delete(card):cardSelected.add(card);if(!cardSelected.size)cardSelected.add('all');} window._cardSelected=cardSelected; syncCardChips(); syncCardSheet(); if(window.applyFilters)window.applyFilters(); }
function toggleCardChip(el,card){ if(card==='all'){cardSelected.clear();cardSelected.add('all');}else{cardSelected.delete('all');cardSelected.has(card)?cardSelected.delete(card):cardSelected.add(card);if(!cardSelected.size)cardSelected.add('all');} window._cardSelected=cardSelected; syncCardSheet(); syncCardChips(); if(window.applyFilters)window.applyFilters(); }
function cardReset(){ cardSelected.clear(); cardSelected.add('all'); syncCardSheet(); syncCardChips(); if(window.applyFilters)window.applyFilters(); }
var cardSO=false;
function toggleCardSheet(){ cardSO?closeCardSheet():openCardSheet(); }
function openCardSheet(){ cardSO=true; document.getElementById('card-overlay').classList.add('open'); document.getElementById('card-sheet').classList.add('open'); document.getElementById('card-all-btn').textContent='모두보기 ▴'; }
function closeCardSheet(){ cardSO=false; document.getElementById('card-overlay').classList.remove('open'); document.getElementById('card-sheet').classList.remove('open'); document.getElementById('card-all-btn').textContent='모두보기 ▾'; }

var cats=['식당','카페','펍','패스트푸드','이자카야','편의점','마트','호텔','입장권','전철 티켓','버스','ATM기','기타'];
var selected = new Set();
window._selected = selected;
var catWrap = document.getElementById('cat-wrap');
var sheetWrap = document.getElementById('sheet-wrap');
cats.forEach(function(lbl){
  var d=document.createElement('div'); d.className='sq-chip'; d.textContent=lbl; d.dataset.lbl=lbl;
  d.onclick=function(){ toggleCat(lbl); syncCats(); }; catWrap.appendChild(d);
  var s=document.createElement('div'); s.className='sheet-chip'; s.textContent=lbl; s.dataset.lbl=lbl;
  s.onclick=function(){ toggleCat(lbl); syncCats(); if(window.applyFilters)window.applyFilters(); }; sheetWrap.appendChild(s);
});
document.getElementById('cat-all-select').classList.add('on');

function toggleCat(lbl){ selected.has(lbl)?selected.delete(lbl):selected.add(lbl); document.getElementById('cat-all-select').classList.remove('on'); window._selected=selected; if(window.applyFilters)window.applyFilters(); }
function syncCats(){ catWrap.querySelectorAll('.sq-chip').forEach(function(c){c.classList.toggle('on',selected.has(c.dataset.lbl));}); sheetWrap.querySelectorAll('.sheet-chip').forEach(function(c){c.classList.toggle('on',selected.has(c.dataset.lbl));}); }
function catSelectAll(){ selected.clear(); catWrap.querySelectorAll('.sq-chip').forEach(function(c){c.classList.remove('on');}); sheetWrap.querySelectorAll('.sheet-chip').forEach(function(c){c.classList.remove('on');}); document.getElementById('cat-all-select').classList.add('on'); window._selected=selected; if(window.applyFilters)window.applyFilters(); }
function resetCats(){ selected.clear(); syncCats(); }
var catSO=false;
function toggleSheet(){ catSO?closeSheet():openSheet(); }
function openSheet(){ catSO=true; document.getElementById('overlay').classList.add('open'); document.getElementById('sheet').classList.add('open'); document.getElementById('cat-all-btn').textContent='모두보기 ▴'; }
function closeSheet(){ catSO=false; document.getElementById('overlay').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); document.getElementById('cat-all-btn').textContent='모두보기 ▾'; }

// PC 드래그 스크롤
document.querySelectorAll('.chip-row,.cat-wrap').forEach(function(el){
  var down=false,sx,sl;
  el.addEventListener('mousedown',function(e){down=true;sx=e.pageX-el.offsetLeft;sl=el.scrollLeft;});
  el.addEventListener('mouseleave',function(){down=false;});
  el.addEventListener('mouseup',function(){down=false;});
  el.addEventListener('mousemove',function(e){if(!down)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx);});
});
</script>
</body>
