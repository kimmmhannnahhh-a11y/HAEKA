<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone-wrap{position:relative;width:300px}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between}
.topbar{background:#1A5D1A;padding:10px 16px 12px;display:flex;align-items:center;justify-content:center;border-bottom:0.5px solid rgba(255,255,255,0.15);position:relative}
.topbar-title{font-size:15px;font-weight:600;color:#fff}
.back-btn{position:absolute;left:14px;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1}
.live-bar{margin:10px 16px 0;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-txt{font-size:11px;color:#4ADE80;font-weight:500}
.search-wrap{padding:8px 16px 0}
.search-box{display:flex;align-items:center;background:#f5f5f5;border:1.5px solid #e0e0e0;border-radius:24px;padding:7px 12px;gap:8px;transition:.15s}
.search-box:focus-within{border-color:#1A5D1A;background:#fff}
.city-chip{display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ddd;border-radius:20px;padding:3px 8px 3px 6px;font-size:10px;font-weight:600;color:#333;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:.12s}
.city-chip:hover{border-color:#1A5D1A;color:#1A5D1A}
.city-chip-icon{font-size:11px}
.city-chip-arrow{font-size:8px;color:#aaa}
.search-divider{width:1px;height:14px;background:#ddd;flex-shrink:0}
.search-input{flex:1;border:none;background:transparent;font-size:12px;color:#333;outline:none;font-family:inherit;min-width:0}
.search-input::placeholder{color:#bbb}
.search-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1A5D1A;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.search-btn:hover{background:#145014}
.search-btn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round}
.search-result-bar{display:none;padding:8px 16px 0;font-size:11px;color:#999}
.search-result-bar.show{display:block}
.search-result-bar span{color:#1A5D1A;font-weight:600}
.filt{display:flex;align-items:center;gap:6px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.filt::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #ddd;font-size:11px;font-weight:500;color:#555;background:#fff;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit}
.fb:hover{border-color:#1A5D1A;color:#1A5D1A}
.fb.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A;font-weight:600}
.post-list{padding:8px 0}
.fpost{padding:12px 16px;border-bottom:0.5px solid #f5f5f5;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:.12s}
.fpost:last-child{border-bottom:none}
.fpost:hover{background:#fafafa}
.new-dot{width:4px;height:4px;border-radius:50%;background:#e53935;flex-shrink:0;margin-top:7px}
.fpav{width:28px;height:28px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.fpmain{flex:1;min-width:0}
.fphead{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.fpu{font-size:11px;font-weight:600;color:#333}
.fpd{font-size:10px;color:#bbb}
.fptitle{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fpbody{font-size:11px;color:#777;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.fpbottom{display:flex;align-items:center;gap:6px}
.fptag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;flex-shrink:0}
.fptag-mate{background:#1A5D1A;color:#fff}
.fptag-food{background:#ea6500;color:#fff}
.fptag-weather{background:#3b82f6;color:#fff}
.fptag-info{background:#eab308;color:#fff}
.fpfooter-info{display:flex;align-items:center;gap:6px;font-size:10px;color:#bbb}
.fpthumb{width:52px;height:52px;border-radius:6px;overflow:hidden;flex-shrink:0;align-self:flex-end}
.bnav{display:flex;border-top:0.5px solid #eee;background:#fff;padding:8px 0 10px}
.ni{flex:1;text-align:center;font-size:9px;color:#999;cursor:pointer;padding:3px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.ni.on{color:#1A5D1A;font-weight:600}
.ni svg{width:17px;height:17px}
.nplus{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.npbtn{width:36px;height:36px;border-radius:50%;background:#1A5D1A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;border:none;cursor:pointer;margin-bottom:2px;margin-top:-4px}
.nplbl{font-size:9px;color:#1A5D1A;font-weight:600}
.side-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:20;display:none;border-radius:26px}
.side-overlay.open{display:block}
.side-panel{position:absolute;top:0;right:0;width:200px;height:100%;background:#fff;border-left:0.5px solid #eee;z-index:21;display:flex;flex-direction:column;border-radius:0 26px 26px 0;overflow:hidden;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.side-panel.open{transform:translateX(0)}
.panel-header{padding:14px 14px 10px;border-bottom:0.5px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:700}
.panel-close{font-size:16px;color:#999;cursor:pointer;background:none;border:none;line-height:1}
.panel-searchbar{margin:9px 12px;background:#f5f5f5;border-radius:20px;padding:7px 11px;font-size:11px;color:#aaa;display:flex;align-items:center;gap:5px}
.panel-searchbar svg{width:12px;height:12px;stroke:#aaa;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.panel-list{flex:1;overflow-y:auto}
.panel-item{padding:10px 14px;font-size:12px;color:#333;border-bottom:0.5px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.panel-item:hover{background:#f9f9f9}
.panel-flag{font-size:14px;margin-right:6px}
.panel-arr{font-size:10px;color:#ccc}
.panel-back{padding:9px 14px;font-size:11px;color:#555;cursor:pointer;display:flex;align-items:center;gap:4px;border-bottom:0.5px solid #f0f0f0;background:#f9f9f9}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmcsC_89TfZUIhgH6hKPaTKLXQn3rRzCo",
  authDomain: "card-store-finder.firebaseapp.com",
  projectId: "card-store-finder",
  storageBucket: "card-store-finder.firebasestorage.app",
  messagingSenderId: "340038449458",
  appId: "1:340038449458:web:14c3327a26d0d2892f3f2b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const catTagMap = {'동행':'mate','맛집':'food','날씨':'weather','정보':'info'};
const catBgMap = {'동행':'#eef0f8','맛집':'#f5f0e8','날씨':'#e8f0f8','정보':'#f0f5ee'};
const catEmojiMap = {'동행':'🤝','맛집':'🍽️','날씨':'☀️','정보':'ℹ️'};

function timeAgo(ts){
  if(!ts) return '방금 전';
  var t = ts.toMillis ? ts.toMillis() : ts;
  var diff = Math.floor((Date.now()-t)/60000);
  if(diff<1) return '방금 전';
  if(diff<60) return diff+'분 전';
  if(diff<1440) return Math.floor(diff/60)+'시간 전';
  var d=new Date(t);
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

const q = query(collection(db,'posts'), orderBy('createdAt','desc'), limit(50));
onSnapshot(q, function(snapshot){
  var fbPosts = [];
  snapshot.forEach(function(doc){
    var d = doc.data();
    var tag = catTagMap[d.category] || 'info';
    fbPosts.push({
      id: doc.id,
      av: catEmojiMap[d.category]||'✈️',
      user: d.nickname || '여행자',
      date: d.createdAt ? new Date(d.createdAt.toMillis()).toLocaleDateString('ko',{month:'2-digit',day:'2-digit'}).replace(/\./g,'').replace(' ','') : '',
      city: d.city || '',
      title: d.title || '',
      body: d.body || '',
      tag: tag,
      tagTxt: d.category || '정보',
      images: d.images || [],
      thumb: d.images&&d.images[0] ? '<img src="'+d.images[0]+'" style="width:100%;height:auto;object-fit:contain;border-radius:8px;display:block">' : (catEmojiMap[d.category]||'✈️'),
      thumbBg: catBgMap[d.category]||'#f5f5f5',
      time: timeAgo(d.createdAt),
      cmts: d.commentCount||0,
      likes: d.likeCount||0,
      fromFirebase: true,
    });
  });
  // Firebase 글 + 더미 데이터 합치기
  window._fbPosts = fbPosts;
  window.posts = fbPosts;
  if(window.renderPosts) window.renderPosts(window.posts);
});
</script>

<script>
var posts = [];

function getReadSet(){ try{ return new Set(JSON.parse(localStorage.getItem('haeka_read_posts')||'[]')); }catch(e){ return new Set(); } }
function markRead(id){ try{ var s=getReadSet(); s.add(id); localStorage.setItem('haeka_read_posts',JSON.stringify([...s])); }catch(e){} }

function renderPosts(list){
  var el = document.getElementById('post-list');
  if(!list.length){ el.innerHTML='<div style="padding:32px 16px;text-align:center;font-size:13px;color:#bbb">검색 결과가 없어요</div>'; return; }
  var readSet = getReadSet();
  el.innerHTML = list.map(function(p){
    var tagClass = p.tag==='mate'?'fptag-mate':p.tag==='food'?'fptag-food':p.tag==='weather'?'fptag-weather':'fptag-info';
    var hasImg = p.fromFirebase && p.images && p.images[0];
    var thumbHtml = hasImg
      ? '<div class="fpthumb"><img src="'+p.images[0]+'" style="width:60px;height:60px;object-fit:cover;display:block;border-radius:6px"/></div>'
      : '';
    var isNew = p.id && !readSet.has(p.id);
    var dotHtml = isNew ? '<div class="new-dot"></div>' : '<div style="width:7px;flex-shrink:0"></div>';
    var detailUrl = p.id ? 'heka_post_detail.html?id='+p.id : 'heka_post_detail.html';
    var onclickFn = p.id ? "markRead('"+p.id+"');location.href='"+detailUrl+"'" : "location.href='"+detailUrl+"'";
    return '<div class="fpost" onclick="'+onclickFn+'" style="cursor:pointer">'+dotHtml+'<div class="fpav">'+p.av+'</div><div class="fpmain"><div class="fphead"><span class="fpu">'+p.user+'</span><span class="fpd">'+p.date+' · '+p.city+'</span></div><div class="fptitle">'+p.title+'</div><div class="fpbottom"><span class="fptag '+tagClass+'">'+p.tagTxt+'</span><div class="fpfooter-info"><span>❤ '+(p.likes||0)+'</span><span>💬 '+(p.cmts||0)+'</span><span>'+p.time+'</span></div></div></div>'+thumbHtml+'</div>';
  }).join('');
}
window.renderPosts = renderPosts;

function doSearch(){
  var kw=document.getElementById('search-input').value.trim();
  var bar=document.getElementById('search-result-bar');
  if(kw){
    document.getElementById('search-keyword').textContent=kw;
    bar.classList.add('show');
    var lower=kw.toLowerCase();
    renderPosts(posts.filter(function(p){ return p.title.toLowerCase().indexOf(lower)>-1||p.body.toLowerCase().indexOf(lower)>-1||p.city.toLowerCase().indexOf(lower)>-1; }));
  } else { bar.classList.remove('show'); renderPosts(posts); }
  document.getElementById('search-input').blur();
}

var _selectedTags = new Set();

function toggleF(el){
  var tag = el.textContent.trim();
  if(tag === '전체'){
    _selectedTags.clear();
    document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
    el.classList.add('on');
  } else {
    document.querySelector('.fb').classList.remove('on'); // 전체 버튼 off
    if(el.classList.contains('on')){
      el.classList.remove('on');
      _selectedTags.delete(tag);
      if(_selectedTags.size === 0){
        document.querySelector('.fb').classList.add('on'); // 다 해제되면 전체로
      }
    } else {
      el.classList.add('on');
      _selectedTags.add(tag);
    }
  }
  filterByTag();
}

function filterByTag(){
  if(_selectedTags.size === 0){
    renderPosts(posts);
  } else {
    renderPosts(posts.filter(function(p){
      return _selectedTags.has(p.tagTxt);
    }));
  }
}

var countries=[{flag:'🌍',name:'전 세계'},{flag:'🇯🇵',name:'일본'},{flag:'🇫🇷',name:'프랑스'},{flag:'🇺🇸',name:'미국'},{flag:'🇹🇭',name:'태국'},{flag:'🇻🇳',name:'베트남'},{flag:'🇪🇸',name:'스페인'},{flag:'🇮🇹',name:'이탈리아'},{flag:'🇩🇪',name:'독일'},{flag:'🇭🇷',name:'크로아티아'}];
var cities={'일본':[{name:'도쿄'},{name:'오사카'},{name:'교토'},{name:'삿포로'},{name:'후쿠오카'}],'프랑스':[{name:'파리'},{name:'리옹'},{name:'니스'}],'미국':[{name:'뉴욕'},{name:'로스앤젤레스'},{name:'라스베가스'}],'태국':[{name:'방콕'},{name:'치앙마이'},{name:'푸켓'}],'베트남':[{name:'하노이'},{name:'호치민'},{name:'다낭'}],'스페인':[{name:'바르셀로나'},{name:'마드리드'},{name:'세비야'}],'이탈리아':[{name:'로마'},{name:'밀라노'},{name:'베네치아'}],'독일':[{name:'베를린'},{name:'뮌헨'},{name:'함부르크'}],'크로아티아':[{name:'자그레브'},{name:'두브로브니크'},{name:'스플리트'}]};

function openPanel(){ renderCountries(); document.getElementById('side-overlay').classList.add('open'); document.getElementById('side-panel').classList.add('open'); }
function closePanel(){ document.getElementById('side-overlay').classList.remove('open'); document.getElementById('side-panel').classList.remove('open'); }
function renderCountries(){
  document.getElementById('panel-title').textContent='나라 선택';
  document.getElementById('panel-ph').textContent='나라를 검색해보세요';
  var list=document.getElementById('panel-list'); list.innerHTML='';
  countries.forEach(function(c){ var div=document.createElement('div'); div.className='panel-item'; div.innerHTML='<div><span class="panel-flag">'+c.flag+'</span>'+c.name+'</div><span class="panel-arr">›</span>'; div.onclick=function(){ if(c.name==='전 세계') select('전 세계','🌍'); else if(cities[c.name]) renderCities(c.name,c.flag); else select(c.name,c.flag); }; list.appendChild(div); });
}
function renderCities(country,flag){
  document.getElementById('panel-title').textContent=flag+' '+country;
  document.getElementById('panel-ph').textContent='도시를 검색해보세요';
  var list=document.getElementById('panel-list'); list.innerHTML='';
  var back=document.createElement('div'); back.className='panel-back'; back.innerHTML='‹ 나라 선택으로'; back.onclick=renderCountries; list.appendChild(back);
  // 나라 전체보기 버튼
  var allDiv=document.createElement('div'); allDiv.className='panel-item'; allDiv.style.cssText='background:#f0f9f0;font-weight:700;color:#1A5D1A';
  allDiv.innerHTML='<div>'+flag+' '+country+' 전체보기</div><span class="panel-arr" style="color:#1A5D1A">›</span>';
  allDiv.onclick=function(){ select(country+' 전체',flag); }; list.appendChild(allDiv);
  (cities[country]||[]).forEach(function(c){ var div=document.createElement('div'); div.className='panel-item'; div.innerHTML='<div>'+c.name+'</div><span class="panel-arr">›</span>'; div.onclick=function(){ select(c.name,flag); }; list.appendChild(div); });
}
function select(name,flag){
  var chipIcon=document.querySelector('.city-chip-icon');
  if(name==='전 세계'){ chipIcon.textContent='🌏'; document.getElementById('city-chip-txt').textContent='전 세계'; }
  else { chipIcon.textContent=flag; document.getElementById('city-chip-txt').textContent=name; }
  closePanel();
}
function openWrite(){
  document.getElementById('write-overlay').classList.add('open');
  document.getElementById('write-popup').style.transform='translateY(0)';
}
function closeWrite(){
  document.getElementById('write-overlay').classList.remove('open');
  document.getElementById('write-popup').style.transform='translateY(100%)';
}
function selectTag(el){
  document.querySelectorAll('.write-tag').forEach(function(b){b.style.background='#fff';b.style.color='#555';b.style.borderColor='#ddd';});
  el.style.background='#1A5D1A';el.style.color='#fff';el.style.borderColor='#1A5D1A';
}
function submitWrite(){
  var title=document.getElementById('write-title').value.trim();
  var body=document.getElementById('write-body').value.trim();
  if(!title||!body){ alert('제목과 내용을 입력해주세요'); return; }
  closeWrite();
  document.getElementById('write-title').value='';
  document.getElementById('write-body').value='';
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; },2200);
}

renderPosts(posts);
</script>
