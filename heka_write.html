<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative;height:660px;display:flex;flex-direction:column}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between;flex-shrink:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:.5px solid #f0f0f0;background:#fff;flex-shrink:0}
.back-btn{background:none;border:none;font-size:18px;color:#111;cursor:pointer;padding:0;line-height:1}
.topbar-title{font-size:14px;font-weight:700;color:#111}
.submit-btn{background:#1A5D1A;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.scroll-wrap{flex:1;overflow-y:auto;padding-bottom:20px}
.scroll-wrap::-webkit-scrollbar{display:none}
.city-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:.5px solid #f0f0f0;cursor:pointer}
.city-label{font-size:13px;color:#bbb}
.city-label.selected{color:#111;font-weight:600}
.cat-row{display:flex;gap:7px;padding:12px 16px;border-bottom:.5px solid #f0f0f0}
.cat-chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid #e0e0e0;background:#fff;color:#888;cursor:pointer;transition:.12s}
.cat-chip.on{background:#1A5D1A;color:#fff;border-color:#1A5D1A}
.title-input{width:100%;padding:14px 16px;border:none;border-bottom:.5px solid #f0f0f0;font-size:14px;font-weight:500;color:#111;outline:none;font-family:inherit}
.title-input::placeholder{color:#ccc;font-weight:400}
.body-input{width:100%;padding:14px 16px;border:none;font-size:13px;color:#333;outline:none;font-family:inherit;resize:none;min-height:130px;line-height:1.6}
.body-input::placeholder{color:#ccc}
.photo-row{padding:10px 16px;border-top:.5px solid #f0f0f0;display:flex;gap:8px;align-items:center;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.photo-row::-webkit-scrollbar{display:none}
.photo-add{width:58px;height:58px;border-radius:10px;border:1.5px dashed #d0d0d0;background:#f8f8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:3px}
.photo-add span{font-size:8px;color:#bbb;font-weight:600}
.photo-thumb{width:58px;height:58px;border-radius:10px;overflow:hidden;position:relative;flex-shrink:0;border:1px solid #e0e0e0}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.city-panel-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;border-radius:26px}
.city-panel-overlay.open{display:block}
.city-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;z-index:51;max-height:85%;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.city-panel.open{transform:translateY(0)}
.city-panel-handle{width:34px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 8px;flex-shrink:0}
.city-search-wrap{padding:0 14px 10px;flex-shrink:0}
.city-search-box{display:flex;align-items:center;background:#f5f5f5;border-radius:20px;padding:8px 12px;gap:8px}
.city-search-input{flex:1;border:none;background:none;font-size:12px;outline:none;font-family:inherit;color:#111}
.city-search-input::placeholder{color:#bbb}
.city-list{overflow-y:auto;flex:1;padding:0 14px 16px}
.city-item{padding:11px 4px;font-size:13px;color:#333;border-bottom:.5px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;gap:8px}
.city-item:last-child{border-bottom:none}
.city-empty{padding:20px;text-align:center;color:#bbb;font-size:12px}
.toast{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="phone">
  <div class="sb"><span>9:41</span><span>해카</span><span style="opacity:0">●</span></div>
  <div class="topbar">
    <button class="back-btn" onclick="location.href='heka_yeohaengtok_v2.html'">←</button>
    <span class="topbar-title">여행톡 글쓰기</span>
    <button class="submit-btn" onclick="submitPost()">등록</button>
  </div>
  <div class="scroll-wrap">
    <div class="city-row" onclick="openCityPanel()">
      <span class="city-label" id="city-label">도시 선택</span>
      <span style="font-size:12px;color:#bbb">›</span>
    </div>
    <div class="cat-row">
      <div class="cat-chip" onclick="selectCat(this,'동행')">동행</div>
      <div class="cat-chip" onclick="selectCat(this,'맛집')">맛집</div>
      <div class="cat-chip" onclick="selectCat(this,'날씨')">날씨</div>
      <div class="cat-chip" onclick="selectCat(this,'정보')">정보</div>
    </div>
    <input class="title-input" id="title-input" type="text" maxlength="60" placeholder="제목을 입력해주세요"/>
    <textarea class="body-input" id="body-input" placeholder="여행 이야기를 자유롭게 작성해보세요 ✈️" maxlength="2000"></textarea>
  </div>
  <div class="photo-row" id="photo-row">
    <div class="photo-add" id="photo-add-btn" onclick="document.getElementById('photo-input').click()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span>사진 추가</span>
    </div>
  </div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)"/>
  <div class="city-panel-overlay" id="city-panel-overlay" onclick="closeCityPanel()"></div>
  <div class="city-panel" id="city-panel">
    <div class="city-panel-handle"></div>
    <div class="city-search-wrap">
      <div class="city-search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input class="city-search-input" id="city-search-input" placeholder="도시명 검색" oninput="filterCities(this.value)"/>
      </div>
    </div>
    <div class="city-list" id="city-list"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
var _selectedCity='', _selectedCat='', _photos=[];
var CITIES=[
  {flag:'🇯🇵',name:'도쿄'},{flag:'🇯🇵',name:'오사카'},{flag:'🇯🇵',name:'교토'},{flag:'🇯🇵',name:'후쿠오카'},{flag:'🇯🇵',name:'삿포로'},{flag:'🇯🇵',name:'나고야'},{flag:'🇯🇵',name:'히로시마'},{flag:'🇯🇵',name:'나라'},
  {flag:'🇺🇸',name:'뉴욕'},{flag:'🇺🇸',name:'로스앤젤레스'},{flag:'🇺🇸',name:'라스베가스'},{flag:'🇺🇸',name:'샌프란시스코'},{flag:'🇺🇸',name:'시카고'},{flag:'🇺🇸',name:'시애틀'},{flag:'🇺🇸',name:'마이애미'},
  {flag:'🇫🇷',name:'파리'},{flag:'🇬🇧',name:'런던'},{flag:'🇮🇹',name:'로마'},{flag:'🇮🇹',name:'밀라노'},{flag:'🇪🇸',name:'바르셀로나'},{flag:'🇪🇸',name:'마드리드'},{flag:'🇩🇪',name:'베를린'},{flag:'🇳🇱',name:'암스테르담'},{flag:'🇨🇿',name:'프라하'},{flag:'🇭🇺',name:'부다페스트'},{flag:'🇵🇹',name:'리스본'},{flag:'🇬🇷',name:'아테네'},
  {flag:'🇹🇭',name:'방콕'},{flag:'🇹🇭',name:'푸켓'},{flag:'🇹🇭',name:'치앙마이'},{flag:'🇸🇬',name:'싱가포르'},{flag:'🇻🇳',name:'다낭'},{flag:'🇻🇳',name:'하노이'},{flag:'🇻🇳',name:'호치민'},{flag:'🇮🇩',name:'발리'},{flag:'🇲🇾',name:'쿠알라룸푸르'},{flag:'🇵🇭',name:'세부'},{flag:'🇵🇭',name:'마닐라'},
  {flag:'🇹🇼',name:'타이베이'},{flag:'🇭🇰',name:'홍콩'},{flag:'🇨🇳',name:'상하이'},{flag:'🇨🇳',name:'베이징'},
  {flag:'🇦🇺',name:'시드니'},{flag:'🇦🇺',name:'멜버른'},{flag:'🇨🇦',name:'밴쿠버'},{flag:'🇨🇦',name:'토론토'},
  {flag:'🇹🇷',name:'이스탄불'},{flag:'🇲🇦',name:'마라케시'},{flag:'🇭🇷',name:'두브로브니크'},
];
function openCityPanel(){
  document.getElementById('city-panel-overlay').classList.add('open');
  document.getElementById('city-panel').classList.add('open');
  document.getElementById('city-search-input').value='';
  renderCities(CITIES);
  setTimeout(function(){document.getElementById('city-search-input').focus();},300);
}
function closeCityPanel(){
  document.getElementById('city-panel-overlay').classList.remove('open');
  document.getElementById('city-panel').classList.remove('open');
}
function renderCities(list){
  var el=document.getElementById('city-list');
  if(!list.length){el.innerHTML='<div class="city-empty">검색 결과가 없어요</div>';return;}
  el.innerHTML=list.map(function(c){
    return '<div class="city-item" onclick="selectCity(\''+c.name+'\')">'
      +'<span style="font-size:16px">'+c.flag+'</span>'
      +'<span>'+c.name+'</span></div>';
  }).join('');
}
function filterCities(q){
  q=q.trim();
  if(!q){renderCities(CITIES);return;}
  renderCities(CITIES.filter(function(c){return c.name.indexOf(q)>-1;}));
}
function selectCity(name){
  _selectedCity=name;
  var el=document.getElementById('city-label');
  el.textContent=name; el.classList.add('selected');
  closeCityPanel();
}
function selectCat(el,cat){
  document.querySelectorAll('.cat-chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on'); _selectedCat=cat;
}
function handlePhotos(input){
  Array.from(input.files).forEach(function(f){
    var r=new FileReader();
    r.onload=function(e){_photos.push(e.target.result);renderPhotos();};
    r.readAsDataURL(f);
  });input.value='';
}
function renderPhotos(){
  var row=document.getElementById('photo-row');
  row.innerHTML='';
  _photos.forEach(function(src,i){
    var wrap=document.createElement('div');
    wrap.className='photo-thumb';
    wrap.innerHTML='<img src="'+src+'"/><button class="photo-del" onclick="delPhoto('+i+')">✕</button>';
    row.appendChild(wrap);
  });
  var add=document.createElement('div');
  add.className='photo-add';
  add.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span style="font-size:8px;color:#bbb;font-weight:600">사진 추가</span>';
  add.onclick=function(){document.getElementById('photo-input').click();};
  row.appendChild(add);
}
function delPhoto(i){_photos.splice(i,1);renderPhotos();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function submitPost(){
  if(!_selectedCity){showToast('도시를 선택해주세요');return;}
  if(!_selectedCat){showToast('카테고리를 선택해주세요');return;}
  if(!document.getElementById('title-input').value.trim()){showToast('제목을 입력해주세요');return;}
  if(!document.getElementById('body-input').value.trim()){showToast('내용을 입력해주세요');return;}
  showToast('등록됐어요! 🎉');
  setTimeout(function(){location.href='heka_yeohaengtok_v2.html';},1500);
}
</script>
</body>
</html>
