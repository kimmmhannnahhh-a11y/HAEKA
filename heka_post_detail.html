<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative;min-height:620px;display:flex;flex-direction:column}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between;flex-shrink:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid #f0f0f0;background:#fff;flex-shrink:0}
.back-btn{width:30px;height:30px;border-radius:50%;background:#f5f5f5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#111;line-height:1}
.scroll-wrap{flex:1;overflow-y:auto;padding-bottom:70px}
.scroll-wrap::-webkit-scrollbar{display:none}
.slide-wrap{position:relative;width:100%;overflow:hidden}
.slide-inner{display:flex;transition:transform .3s ease}
.slide-img{flex:0 0 100%;width:100%;max-height:320px;object-fit:contain;display:block}
.slide-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.slide-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4)}
.slide-dot.on{background:#fff;width:14px;border-radius:3px}
.post-head{padding:14px 16px 10px;border-bottom:.5px solid #f5f5f5}
.post-tag-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.post-tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700}
.tag-mate{background:#1A5D1A;color:#fff}
.tag-food{background:#ea6500;color:#fff}
.tag-weather{background:#3b82f6;color:#fff}
.tag-info{background:#eab308;color:#fff}
.post-city{font-size:11px;color:#999}
.post-title{font-size:16px;font-weight:700;color:#111;line-height:1.4;margin-bottom:10px}
.post-meta{display:flex;align-items:center;gap:8px}
.post-av{width:28px;height:28px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#555;flex-shrink:0}
.post-nick{font-size:12px;font-weight:600;color:#333}
.post-date{font-size:11px;color:#bbb}
.post-body{padding:14px 16px;font-size:13px;color:#333;line-height:1.8;border-bottom:.5px solid #f5f5f5;white-space:pre-wrap;word-break:break-all}
.action-row{display:flex;align-items:center;padding:11px 16px;border-bottom:.5px solid #f5f5f5}
.act-left{display:flex;align-items:center;gap:5px}
.act-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.act-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-size:12px;color:#888;font-family:inherit;padding:4px 0;transition:.12s}
.act-btn svg{width:16px;height:16px;flex-shrink:0;transition:.15s}
.act-btn.liked{color:#e53935}
.act-btn.liked svg{fill:#e53935;stroke:#e53935}
.act-btn.saved{color:#1A5D1A}
.act-btn.saved svg{fill:#1A5D1A;stroke:#1A5D1A}
.cmt-head{padding:12px 16px 6px;font-size:12px;font-weight:700;color:#333;display:flex;align-items:center;gap:5px}
.cmt-count{font-size:11px;color:#1A5D1A;font-weight:700}
.cmt-item{padding:10px 16px;border-bottom:.5px solid #f8f8f8;display:flex;gap:9px}
.cmt-av{width:26px;height:26px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#555;flex-shrink:0;margin-top:1px}
.cmt-body{flex:1;min-width:0}
.cmt-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.cmt-nick{font-size:11px;font-weight:700;color:#333}
.cmt-date{font-size:10px;color:#bbb}
.cmt-txt{font-size:12px;color:#444;line-height:1.5;word-break:break-all}
.cmt-reply-btn{font-size:10px;color:#bbb;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;margin-top:5px;display:inline-block;transition:.12s}
.cmt-reply-btn:hover{color:#1A5D1A}
.reply-item{padding:8px 16px 8px 51px;border-bottom:.5px solid #f8f8f8;display:flex;gap:8px;background:#fafafa}
.reply-av{width:22px;height:22px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#666;flex-shrink:0;margin-top:1px}
.reply-body{flex:1;min-width:0}
.reply-nick{font-size:10px;font-weight:700;color:#333;margin-right:5px}
.reply-date{font-size:10px;color:#bbb}
.reply-txt{font-size:11px;color:#555;line-height:1.5;margin-top:2px;word-break:break-all}
.reply-input-wrap{padding:7px 16px 7px 51px;background:#f0f0f0;display:flex;gap:6px;align-items:center}
.reply-input{flex:1;padding:6px 10px;border-radius:14px;border:1.5px solid #e0e0e0;font-size:11px;font-family:inherit;outline:none;background:#fff;color:#111}
.reply-input:focus{border-color:#1A5D1A}
.reply-submit{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1A5D1A;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reply-submit:disabled{background:#ccc}
.reply-submit svg{width:11px;height:11px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.reply-cancel{font-size:10px;color:#bbb;cursor:pointer;background:none;border:none;font-family:inherit;padding:0 2px;white-space:nowrap}
.cmt-empty{padding:24px 16px;text-align:center;font-size:12px;color:#bbb}
.cmt-input-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 14px;background:#fff;border-top:.5px solid #f0f0f0;display:flex;gap:8px;align-items:center}
.cmt-input{flex:1;padding:8px 12px;border-radius:20px;border:1.5px solid #e0e0e0;font-size:12px;font-family:inherit;outline:none;background:#f8f8f8;color:#111;transition:.15s}
.cmt-input:focus{border-color:#1A5D1A;background:#fff}
.cmt-submit{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:#1A5D1A;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cmt-submit:disabled{background:#ccc}
.cmt-submit svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.loading{padding:40px 16px;text-align:center;font-size:12px;color:#bbb}
.toast{position:absolute;left:50%;bottom:76px;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.75);color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<div class="phone">
  <div class="sb"><span>9:41</span><span>해카</span><span style="opacity:0">●</span></div>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <span style="font-size:13px;font-weight:700;color:#111">여행톡</span>
    <div id="post-del-btn" style="width:30px"></div>
  </div>
  <div class="scroll-wrap" id="scroll-wrap">
    <div class="loading" id="loading">불러오는 중...</div>
  </div>

    <input class="cmt-input" id="cmt-input" placeholder="댓글을 입력해주세요" maxlength="300" oninput="syncSubmitBtn()"/>
    <button class="cmt-submit" id="cmt-submit" onclick="submitComment()" disabled>
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, getDoc, deleteDoc, collection, addDoc, getDocs, query, orderBy, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey:"AIzaSyCmcsC_89TfZUIhgH6hKPaTKLXQn3rRzCo",
  authDomain:"card-store-finder.firebaseapp.com",
  projectId:"card-store-finder",
  storageBucket:"card-store-finder.firebasestorage.app",
  messagingSenderId:"340038449458",
  appId:"1:340038449458:web:14c3327a26d0d2892f3f2b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const params = new URLSearchParams(location.search);
const postId = params.get('id');
window._postId = postId;

async function loadPost(){
  if(!postId){ document.getElementById('loading').textContent='게시글을 찾을 수 없어요'; return; }
  try{
    const snap = await getDoc(doc(db,'posts',postId));
    if(!snap.exists()){ document.getElementById('loading').textContent='게시글을 찾을 수 없어요'; return; }
    window._post = {id:snap.id,...snap.data()};
    if(window.renderPost) window.renderPost(window._post);
  }catch(e){ document.getElementById('loading').textContent='불러오기 실패'; }
}

function listenComments(){
  if(!postId) return;
  const q = query(collection(db,'posts',postId,'comments'), orderBy('createdAt','asc'));
  onSnapshot(q, async function(snapshot){
    var cmts=[];
    snapshot.forEach(function(d){ cmts.push({id:d.id,...d.data()}); });

    // 각 댓글의 대댓글 수 합산해서 실제 총 댓글수 계산 후 Firebase 업데이트
    try{
      var total = cmts.length;
      for(var i=0; i<cmts.length; i++){
        var rsnap = await getDocs(collection(db,'posts',postId,'comments',cmts[i].id,'replies'));
        total += rsnap.size;
      }
      await updateDoc(doc(db,'posts',postId),{commentCount: total});
    }catch(e){}

    if(window.renderComments) window.renderComments(cmts);
  });
}

window._addComment = async function(text, parentId){
  if(parentId){
    await addDoc(collection(db,'posts',postId,'comments',parentId,'replies'),{
      text:text, nickname:'해카마왕', createdAt:new Date()
    });
    try{ await updateDoc(doc(db,'posts',postId),{commentCount:increment(1)}); }catch(e){}
  } else {
    await addDoc(collection(db,'posts',postId,'comments'),{
      text:text, nickname:'해카마왕', createdAt:new Date()
    });
    try{ await updateDoc(doc(db,'posts',postId),{commentCount:increment(1)}); }catch(e){}
  }
};

window._updateLike = async function(delta){
  try{ await updateDoc(doc(db,'posts',postId),{likeCount:increment(delta)}); }catch(e){}
};

window._listenReplies = function(cmtId, callback){
  const q = query(collection(db,'posts',postId,'comments',cmtId,'replies'), orderBy('createdAt','asc'));
  return onSnapshot(q, function(snap){
    var replies=[];
    snap.forEach(function(d){ replies.push({id:d.id,...d.data()}); });
    callback(replies);
  });
};

window._deletePost = async function(){
  await deleteDoc(doc(db,"posts",postId));
};

window._deleteComment = async function(cmtId){
  await deleteDoc(doc(db,"posts",postId,"comments",cmtId));
  try{ await updateDoc(doc(db,"posts",postId),{commentCount:increment(-1)}); }catch(e){}
};

window._deleteReply = async function(cmtId, replyId){
  await deleteDoc(doc(db,"posts",postId,"comments",cmtId,"replies",replyId));
  try{
    var snap=await getDoc(doc(db,"posts",postId));
    var cur=(snap.data().commentCount||0);
    await updateDoc(doc(db,"posts",postId),{commentCount:Math.max(0,cur-1)});
  }catch(e){}
};

loadPost();
listenComments();
</script>

<script>
function timeAgo(ts){
  if(!ts) return '방금 전';
  var t=ts.toMillis?ts.toMillis():(ts.seconds?ts.seconds*1000:(typeof ts==='number'?ts:Date.now()));
  var diff=Math.floor((Date.now()-t)/60000);
  if(diff<1) return '방금 전';
  if(diff<60) return diff+'분 전';
  if(diff<1440) return Math.floor(diff/60)+'시간 전';
  return Math.floor(diff/1440)+'일 전';
}

function formatDate(ts){
  if(!ts) return '';
  var t=ts.toMillis?ts.toMillis():(ts.seconds?ts.seconds*1000:(typeof ts==='number'?ts:Date.now()));
  var d=new Date(t);
  var yyyy=d.getFullYear();
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  var hh=String(d.getHours()).padStart(2,'0');
  var min=String(d.getMinutes()).padStart(2,'0');
  return yyyy+'.'+mm+'.'+dd+' '+hh+':'+min;
}

var _liked=false, _saved=false;
var _slideIdx=0, _images=[];
var _activeReplyId=null, _replyUnsubs={};
var tagMap={'동행':'tag-mate','맛집':'tag-food','날씨':'tag-weather','정보':'tag-info'};

var heartSvg='<svg viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>';
var bookmarkSvg='<svg viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>';
var shareSvg='<svg viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';
var sendSvg='<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';

window.renderPost=function(p){
  _images=p.images||[];
  var tagClass=tagMap[p.category]||'tag-info';
  var avatarLetter=(p.nickname||'여').charAt(0);
  var likes=p.likeCount||0;
  try{
    var saved=JSON.parse(localStorage.getItem('haeka_saved_posts')||'[]');
    _saved=saved.some(function(s){return s.id===window._postId;});
  }catch(e){}
  // 좋아요 상태 복원
  try{
    var likedPosts=JSON.parse(localStorage.getItem('haeka_liked_posts')||'[]');
    _liked=likedPosts.indexOf(window._postId)>-1;
  }catch(e){}

  var slideHtml='';
  if(_images.length){
    var imgs=_images.map(function(src){return '<img class="slide-img" src="'+src+'" loading="lazy"/>';}).join('');
    var dots=_images.length>1?'<div class="slide-dots" id="slide-dots">'+_images.map(function(_,i){
      return '<div class="slide-dot'+(i===0?' on':'')+'" onclick="slideTo('+i+')"></div>';
    }).join('')+'</div>':'';
    slideHtml='<div class="slide-wrap" id="slide-wrap"><div class="slide-inner" id="slide-inner">'+imgs+'</div>'+dots+'</div>';
  }

  var html=slideHtml
    +'<div class="post-head">'
    +'<div class="post-tag-row"><span class="post-tag '+tagClass+'">'+(p.category||'정보')+'</span><span class="post-city">'+(p.city||'')+'</span></div>'
    +'<div class="post-title">'+p.title+'</div>'
    +'<div class="post-meta"><div class="post-av">'+avatarLetter+'</div><span class="post-nick">'+(p.nickname||'여행자')+'</span><span class="post-date">'+formatDate(p.createdAt)+'</span></div>'
    +'</div>'
    +'<div class="post-body">'+(p.body||'')+'</div>'
    +'<div class="action-row">'
    +'<div class="act-left"><button class="act-btn" id="like-btn" onclick="toggleLike()">'+heartSvg+'<span id="like-count">'+likes+'</span></button></div>'
    +'<div class="act-right">'
    +'<button class="act-btn'+(_saved?' saved':'')+'" id="save-btn" onclick="toggleSave()">'+bookmarkSvg+'</button>'
    +'<button class="act-btn" onclick="sharePost()">'+shareSvg+'</button>'
    +'</div></div>'
    +'<div class="cmt-head">댓글 <span class="cmt-count" id="cmt-count">0</span></div>'
    +'<div id="cmt-list"><div class="cmt-empty">아직 댓글이 없어요<br>첫 댓글을 남겨보세요 💬</div></div>';

  // 본인 글이면 topbar에 X 삭제 버튼
  var delWrap = document.getElementById('post-del-btn');
  if(delWrap){
    if(p.nickname==='해카마왕'){
      delWrap.innerHTML='<button onclick="deletePost()" style="background:none;border:none;font-size:11px;font-weight:600;color:#bbb;cursor:pointer;font-family:inherit;padding:4px">삭제하기</button>';
    } else {
      delWrap.innerHTML='<div style="width:30px"></div>';
    }
  }
  // 좋아요 버튼 상태 반영
  setTimeout(function(){
    var likeBtn=document.getElementById('like-btn');
    if(likeBtn && _liked) likeBtn.classList.add('liked');
  },0);
  document.getElementById('loading').style.display='none';
  document.getElementById('scroll-wrap').innerHTML=html;
  if(_images.length>1) initSlideSwipe();
};

window.renderComments=function(cmts){
  var el=document.getElementById('cmt-list');
  if(!el) return;
  var countEl=document.getElementById('cmt-count');
  if(countEl) countEl.textContent=cmts.length;
  if(!cmts.length){
    el.innerHTML='<div class="cmt-empty">아직 댓글이 없어요<br>첫 댓글을 남겨보세요 💬</div>';
    return;
  }
  el.innerHTML=cmts.map(function(c){
    var letter=(c.nickname||'여').charAt(0);
    var isMyComment=(c.nickname==='해카마왕');
    return '<div id="cmt-wrap-'+c.id+'">'
      +'<div class="cmt-item">'
      +'<div class="cmt-av">'+letter+'</div>'
      +'<div class="cmt-body">'
      +'<div class="cmt-top"><span class="cmt-nick">'+(c.nickname||'여행자')+'</span><span class="cmt-date">'+formatDate(c.createdAt)+'</span></div>'
      +'<div class="cmt-txt">'+c.text+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:5px">'
      +'<button class="cmt-reply-btn" onclick="toggleReplyInput(\''+c.id+'\')">답글 달기</button>'
      +(isMyComment?'<button class="cmt-reply-btn" style="color:#bbb" onclick="deleteCmt(\''+c.id+'\')">삭제</button>':'')
      +'</div>'
      +'</div></div>'
      +'<div id="replies-'+c.id+'"></div>'
      +'<div id="reply-input-'+c.id+'" style="display:none">'
      +'<div class="reply-input-wrap">'
      +'<input class="reply-input" id="reply-text-'+c.id+'" placeholder="답글을 입력해주세요" maxlength="200"'
      +' oninput="syncReplyBtn(\''+c.id+'\')"'
      +' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();submitReply(\''+c.id+'\')}"/>'
      +'<button class="reply-cancel" onclick="closeReplyInput(\''+c.id+'\')">취소</button>'
      +'<button class="reply-submit" id="reply-btn-'+c.id+'" onclick="submitReply(\''+c.id+'\')" disabled>'+sendSvg+'</button>'
      +'</div></div>'
      +'</div>';
  }).join('');

  cmts.forEach(function(c){
    if(_replyUnsubs[c.id]) return;
    if(window._listenReplies){
      _replyUnsubs[c.id]=window._listenReplies(c.id, function(replies){
        renderReplies(c.id, replies);
      });
    }
  });
};

function renderReplies(cmtId, replies){
  var el=document.getElementById('replies-'+cmtId);
  if(!el) return;
  if(!replies.length){ el.innerHTML=''; return; }
  el.innerHTML=replies.map(function(r){
    var letter=(r.nickname||'여').charAt(0);
    var isMyReply=(r.nickname==='해카마왕');
    return '<div class="reply-item">'
      +'<div class="reply-av">'+letter+'</div>'
      +'<div class="reply-body">'
      +'<span class="reply-nick">'+(r.nickname||'여행자')+'</span><span class="reply-date">'+formatDate(r.createdAt)+'</span>'
      +'<div class="reply-txt">'+r.text+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:4px">'
      +'<button class="cmt-reply-btn" onclick="toggleReplyInput(\''+cmtId+'\')" >답글 달기</button>'
      +(isMyReply?'<button class="cmt-reply-btn" style="color:#bbb" onclick="deleteReply(\''+cmtId+'\',\''+r.id+'\')" >삭제</button>':'')
      +'</div>'
      +'</div></div>';
  }).join('');
}

async function deletePost(){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  try{
    if(window._deletePost) await window._deletePost();
    showToast('삭제되었습니다');
    setTimeout(function(){ window.location.href='heka_yeohaengtok_v2.html'; }, 800);
  }catch(e){ showToast('삭제에 실패했어요'); }
}

async function deleteCmt(cmtId){
  if(!confirm('댓글을 삭제할까요?')) return;
  try{
    if(window._deleteComment) await window._deleteComment(cmtId);
    var el=document.getElementById('cmt-wrap-'+cmtId);
    if(el) el.remove();
  }catch(e){ showToast('삭제에 실패했어요'); }
}

async function deleteReply(cmtId, replyId){
  if(!confirm('답글을 삭제할까요?')) return;
  try{
    if(window._deleteReply) await window._deleteReply(cmtId, replyId);
  }catch(e){ showToast('삭제에 실패했어요'); }
}

function toggleReplyInput(cmtId){
  if(_activeReplyId&&_activeReplyId!==cmtId) closeReplyInput(_activeReplyId);
  var wrap=document.getElementById('reply-input-'+cmtId);
  if(!wrap) return;
  if(wrap.style.display==='none'){
    wrap.style.display='block';
    _activeReplyId=cmtId;
    setTimeout(function(){ var inp=document.getElementById('reply-text-'+cmtId); if(inp) inp.focus(); },100);
  } else {
    closeReplyInput(cmtId);
  }
}

function closeReplyInput(cmtId){
  var wrap=document.getElementById('reply-input-'+cmtId);
  if(wrap) wrap.style.display='none';
  var inp=document.getElementById('reply-text-'+cmtId);
  if(inp) inp.value='';
  if(_activeReplyId===cmtId) _activeReplyId=null;
}

function syncReplyBtn(cmtId){
  var inp=document.getElementById('reply-text-'+cmtId);
  var btn=document.getElementById('reply-btn-'+cmtId);
  if(btn) btn.disabled=!inp||!inp.value.trim();
}

async function submitReply(cmtId){
  var inp=document.getElementById('reply-text-'+cmtId);
  if(!inp||!inp.value.trim()) return;
  var text=inp.value.trim();
  var btn=document.getElementById('reply-btn-'+cmtId);
  if(btn) btn.disabled=true;
  try{
    if(window._addComment) await window._addComment(text, cmtId);
    closeReplyInput(cmtId);
  }catch(e){ showToast('답글 등록에 실패했어요'); if(btn) btn.disabled=false; }
}

function toggleLike(){
  _liked=!_liked;
  var btn=document.getElementById('like-btn');
  var cnt=document.getElementById('like-count');
  // localStorage에 좋아요 상태 저장
  try{
    var likedPosts=JSON.parse(localStorage.getItem('haeka_liked_posts')||'[]');
    if(_liked){
      if(likedPosts.indexOf(window._postId)===-1) likedPosts.push(window._postId);
    } else {
      likedPosts=likedPosts.filter(function(id){return id!==window._postId;});
    }
    localStorage.setItem('haeka_liked_posts',JSON.stringify(likedPosts));
  }catch(e){}
  if(_liked){
    if(btn) btn.classList.add('liked');
    if(cnt) cnt.textContent=parseInt(cnt.textContent||0)+1;
    if(window._updateLike) window._updateLike(1);
  } else {
    if(btn) btn.classList.remove('liked');
    if(cnt) cnt.textContent=Math.max(0,parseInt(cnt.textContent||0)-1);
    if(window._updateLike) window._updateLike(-1);
  }
}

function toggleSave(){
  _saved=!_saved;
  var btn=document.getElementById('save-btn');
  try{
    var saved=JSON.parse(localStorage.getItem('haeka_saved_posts')||'[]');
    if(_saved){
      if(btn) btn.classList.add('saved');
      if(window._post) saved.unshift({id:window._postId,title:window._post.title,category:window._post.category,city:window._post.city,nickname:window._post.nickname,savedAt:Date.now()});
      showToast('📌 저장됐어요! 마이페이지에서 확인하세요');
    } else {
      if(btn) btn.classList.remove('saved');
      saved=saved.filter(function(s){return s.id!==window._postId;});
      showToast('저장이 취소됐어요');
    }
    localStorage.setItem('haeka_saved_posts',JSON.stringify(saved));
  }catch(e){}
}

function sharePost(){
  var shareData = {title:'HAEKA 여행톡', text:'해외 카드결제 정보를 확인해보세요!', url:location.href};
  if(typeof navigator.share === 'function'){
    navigator.share(shareData).catch(function(e){
      // 사용자가 취소한 경우 무시
      if(e.name !== 'AbortError'){
        navigator.clipboard.writeText(location.href).then(function(){ showToast('링크가 복사됐어요!'); });
      }
    });
  } else {
    navigator.clipboard.writeText(location.href).then(function(){
      showToast('링크가 복사됐어요!');
    }).catch(function(){
      showToast('링크: '+location.href);
    });
  }
}

async function submitComment(){
  var input=document.getElementById('cmt-input');
  var text=input.value.trim();
  if(!text) return;
  var btn=document.getElementById('cmt-submit');
  btn.disabled=true;
  try{
    if(window._addComment) await window._addComment(text, null);
    input.value=''; syncSubmitBtn();
  }catch(e){ showToast('댓글 등록에 실패했어요'); btn.disabled=false; }
}

function syncSubmitBtn(){
  var input=document.getElementById('cmt-input');
  var btn=document.getElementById('cmt-submit');
  if(btn) btn.disabled=!input.value.trim();
}

function slideTo(idx){
  _slideIdx=idx;
  var inner=document.getElementById('slide-inner');
  if(inner) inner.style.transform='translateX(-'+(idx*100)+'%)';
  document.querySelectorAll('.slide-dot').forEach(function(d,i){d.classList.toggle('on',i===idx);});
}

function initSlideSwipe(){
  var startX=0, isDrag=false;
  var wrap=document.getElementById('slide-wrap');
  if(!wrap) return;
  wrap.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;isDrag=true;},{passive:true});
  wrap.addEventListener('touchend',function(e){
    if(!isDrag) return; isDrag=false;
    var diff=e.changedTouches[0].clientX-startX;
    if(Math.abs(diff)<30) return;
    if(diff<0&&_slideIdx<_images.length-1) slideTo(_slideIdx+1);
    else if(diff>0&&_slideIdx>0) slideTo(_slideIdx-1);
  },{passive:true});
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

document.getElementById('cmt-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitComment();}
});
</script>
</body>
</html>
