<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;justify-content:center;padding:30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:300px;background:#fff;border-radius:26px;border:1px solid #e0e0e0;overflow:hidden;color:#111;position:relative;display:flex;flex-direction:column;height:680px}
.sb{background:#1A5D1A;color:#fff;font-size:10px;padding:10px 16px 6px;display:flex;justify-content:space-between;flex-shrink:0}
.topbar{background:#1A5D1A;padding:10px 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:#fff;flex:1}
.count-bar{padding:6px 14px;font-size:11px;color:#999;flex-shrink:0}
.store-list{flex:1;overflow-y:auto}
.store-list::-webkit-scrollbar{display:none}
.store-item{display:flex;gap:10px;padding:10px 14px;border-bottom:.5px solid #f5f5f5;cursor:pointer;transition:.12s;align-items:flex-start}
.store-item:hover{background:#fafafa}
.store-item:last-child{border-bottom:none}
.store-thumb{width:62px;height:62px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;background:#f5f5f5}
.store-thumb img{width:100%;height:100%;object-fit:cover}
.store-info{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-meta{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.store-cat{font-size:10px;color:#999}
.store-addr{font-size:10px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.store-cards{display:flex;gap:4px;flex-wrap:nowrap;align-items:center;overflow-x:auto;scrollbar-width:none}
.store-cards::-webkit-scrollbar{display:none}
.cpill{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600;color:#fff;white-space:nowrap;flex-shrink:0}
.store-zzim{flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;align-self:center}
.store-zzim svg{width:18px;height:18px;fill:#e53935;stroke:#e53935;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.store-zzim:hover svg{fill:#ff6b6b;stroke:#ff6b6b}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;text-align:center;gap:12px}
.empty-emoji{font-size:40px}
.empty-txt{font-size:14px;font-weight:600;color:#333}
.empty-sub{font-size:12px;color:#bbb;line-height:1.6}
.empty-btn{margin-top:8px;padding:11px 24px;border-radius:24px;background:#1A5D1A;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* мКђлЭЉмЭілУЬ нМ®лДР */
.detail-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:30;display:none;border-radius:26px}
.detail-overlay.open{display:block}
.detail-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;z-index:31;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:88%}
.detail-panel.open{transform:translateY(0)}
.dp-handle{width:36px;height:4px;border-radius:2px;background:#e0e0e0;margin:10px auto 0;flex-shrink:0}
.dp-topbar{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 15px 4px;flex-shrink:0}
.dp-name{font-size:15px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.dp-cat{font-size:11px;color:#999;white-space:nowrap;flex-shrink:0}
.dp-close{background:none;border:none;font-size:20px;color:#bbb;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.dp-scroll{overflow-y:auto;flex:1;padding:0 15px 6px}
.dpill{font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700}
.dp-btn-row{display:flex;gap:8px;padding:8px 15px 14px;flex-shrink:0;border-top:.5px solid #f0f0f0}
.dp-btn-more{flex:1;padding:11px;border-radius:10px;background:#1A5D1A;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* нХШлЛ® лД§лєД */
.bnav{display:flex;border-top:0.5px solid #eee;background:#fff;padding:8px 0 10px;flex-shrink:0}
.ni{flex:1;text-align:center;font-size:9px;color:#999;cursor:pointer;padding:3px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.ni.on{color:#1A5D1A;font-weight:600}
.ni svg{width:17px;height:17px}
.nplus{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.npbtn{width:36px;height:36px;border-radius:50%;background:#1A5D1A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;border:none;cursor:pointer;margin-bottom:2px;margin-top:-4px}
.nplbl{font-size:9px;color:#1A5D1A;font-weight:600}

.toast{position:absolute;left:50%;bottom:70px;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.75);color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAf6YhFy83E7dvy9OL08WvYdnH8qzs58o4&libraries=places&v=beta&language=ko"></script>
</head>
<body>
<div class="phone">
  <div class="sb"><span>9:41</span><span>нХімєі</span><span style="opacity:0">вЧПвЧПвЧП</span></div>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">вЖР</button>
    <span class="topbar-title">м∞Ьл™©л°Э</span>
  </div>

  <div class="count-bar" id="count-bar">лґИлЯђмШ§лКФ м§С...</div>
  <div class="store-list" id="store-list"></div>

  <!-- мКђлЭЉмЭілУЬ нМ®лДР -->
  <div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="dp-handle"></div>
    <div class="dp-topbar">
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="display:flex;align-items:baseline;gap:5px">
          <div class="dp-name" id="dp-name"></div>
          <div class="dp-cat" id="dp-cat"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button id="dp-zzim" onclick="toggleDpZzim()" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#e53935" stroke="#e53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="dp-zzim-svg"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <button class="dp-close" onclick="closeDetail()">вЬХ</button>
      </div>
    </div>
    <div class="dp-scroll" id="dp-scroll"></div>
    <div class="dp-btn-row">
      <button class="dp-btn-more" onclick="goToDetail()">лІ§мЮ• мГБмДЄл≥ікЄ∞ вЖТ</button>
    </div>
  </div>

  <!-- нХШлЛ® лД§лєД -->
  <div class="bnav">
    <div class="ni" onclick="location.href='heka_home_v5.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H14v-6h-4v6H4a1 1 0 01-1-1V9.5z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>нЩИ</div>
    <div class="ni" onclick="location.href='heka_yeohaengtok_v2.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>мЧђнЦЙнЖ°</div>
    <div class="nplus" onclick="location.href='heka_register.html'"><button class="npbtn">+</button><span class="nplbl">лУ±л°Э</span></div>
    <div class="ni on"><svg viewBox="0 0 24 24" fill="#1A5D1A" stroke="#1A5D1A"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>м∞Ьл™©л°Э</div>
    <div class="ni" onclick="location.href='heka_mypage.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#999"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke-width="1.6"/></svg>лІИмЭінОШмЭімІА</div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
function cardColor(c){var m={'VISA':'#1a1f71','MASTER':'#eb001b','JCB':'#007b40','AMEX':'#007bc1','нКЄлЮШлЄФл°ЬкЈЄ':'#FF6B00','нКЄлЮШлЄФмЫФл†Ы':'#b8970a','UnionPay':'#e21836'};return m[c]||'#888';}
function catEmoji(c){var m={'мЛЭлЛє':'рЯНљпЄП','мєінОШ':'вШХ','нОН':'рЯНЇ','нМ®мК§нКЄнСЄлУЬ':'рЯНФ','мЭімЮРмєімХЉ':'рЯПЃ','нОЄмЭШм†Р':'рЯП™','лІИнКЄ':'рЯЫТ','нШЄнЕФ':'рЯП®','мЮЕмЮ•кґМ':'рЯОЂ','м†Дм≤† нЛ∞мЉУ':'рЯЪЗ','л≤ДмК§':'рЯЪМ','ATMкЄ∞':'рЯПІ'};return m[c]||'рЯПђ';}
function catBg(c){var m={'мЛЭлЛє':'#FFF0E0','мєінОШ':'#FFF8E8','нОН':'#F0F8FF','нМ®мК§нКЄнСЄлУЬ':'#FFF4E8','мЭімЮРмєімХЉ':'#FFF0F4','нОЄмЭШм†Р':'#EEF4FF','лІИнКЄ':'#EDFFF4','нШЄнЕФ':'#F4F0FF','мЮЕмЮ•кґМ':'#FEFEE8','м†Дм≤† нЛ∞мЉУ':'#EEF0FF','л≤ДмК§':'#EEFFFA','ATMкЄ∞':'#FFF0FA'};return m[c]||'#F4F4F8';}

// вФАвФА м∞Ь лН∞мЭінД∞ вФАвФА
function getZzimList(){ try{ return JSON.parse(localStorage.getItem('haeka_zzim')||'[]'); }catch(e){ return []; } }
function saveZzimList(list){ try{ localStorage.setItem('haeka_zzim', JSON.stringify(list)); }catch(e){} }
function isZzimed(id){ return getZzimList().some(function(s){ return s.id===id; }); }
function removeZzim(id){
  var list = getZzimList().filter(function(s){ return s.id!==id; });
  saveZzimList(list);
  renderZzimList();
  showToast('м∞Ь л™©л°ЭмЧРмДЬ мВ≠м†ЬлРРмЦімЪФ');
}

// вФАвФА л†МлНФ вФАвФА
var _stores = [];
function renderZzimList(){
  var list = getZzimList();
  _stores = list;
  var el = document.getElementById('store-list');
  document.getElementById('count-bar').textContent = 'м†Дм≤і '+list.length+'к∞Ь';
  if(!list.length){
    el.innerHTML = '<div class="empty-state">'
      +'<div class="empty-emoji">рЯ§Н</div>'
      +'<div class="empty-txt">мХДмІБ м∞ЬнХЬ лІ§мЮ•мЭі мЧЖмЦімЪФ</div>'
      +'<div class="empty-sub">лІИмЭМмЧР лУЬлКФ лІ§мЮ•мЭД<br>нХШнКЄл•Љ лИМлЯђ м†АмЮ•нХіл≥імДЄмЪФ!</div>'
      +'<button class="empty-btn" onclick="location.href=\'heka_nearby_all.html\'">м£Љл≥А лІ§мЮ• л≥ілЯђк∞АкЄ∞</button>'
      +'</div>';
    return;
  }
  var cardOrder=['VISA','MASTER','JCB','AMEX','UnionPay','нКЄлЮШлЄФл°ЬкЈЄ','нКЄлЮШлЄФмЫФл†Ы'];
  el.innerHTML = list.map(function(s, idx){
    var cards=(s.payOk||[]).filter(function(c){return c!=='мєілУЬк∞АлК•'&&c!=='нШДкЄИк∞АлК•'&&c!=='л™®л•ік≤†мЦімЪФ';});
    cards.sort(function(a,b){var ai=cardOrder.indexOf(a),bi=cardOrder.indexOf(b);return(ai<0?99:ai)-(bi<0?99:bi);});
    var pills=cards.map(function(c){return'<span class="cpill" style="background:'+cardColor(c)+'">'+c+'</span>';}).join('');
    var thumb = s.images&&s.images[0]
      ? '<div class="store-thumb"><img src="'+s.images[0]+'" loading="eager" alt=""/></div>'
      : '<div class="store-thumb" style="background:'+catBg(s.category)+'">'+catEmoji(s.category)+'</div>';
    return '<div class="store-item" data-idx="'+idx+'" onclick="openDetail('+idx+')">'
      +thumb
      +'<div class="store-info">'
      +'<div class="store-name">'+s.name+'</div>'
      +'<div class="store-meta"><span class="store-cat">'+(s.category||'')+'</span>'
      +(s.address?'<span class="store-addr"> ¬Ј '+s.address+'</span>':'')
      +'</div>'
      +'<div class="store-cards">'+pills+'</div>'
      +'</div>'
      +'<button class="store-zzim" onclick="event.stopPropagation();removeZzim(\''+s.id+'\')">'
      +'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
      +'</button>'
      +'</div>';
  }).join('');
}

// вФАвФА мКђлЭЉмЭілУЬ нМ®лДР вФАвФА
function openDetail(idx){
  var store = _stores[idx];
  if(!store) return;
  window._currentStoreId = store.id || null;
  document.getElementById('dp-name').textContent = store.name;
  document.getElementById('dp-cat').textContent = store.category || '';
  document.getElementById('dp-scroll').innerHTML = '<div style="padding:20px;text-align:center;color:#bbb;font-size:12px">лґИлЯђмШ§лКФ м§С...</div>';
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');

  var cardOrder=['VISA','MASTER','JCB','AMEX','UnionPay','нКЄлЮШлЄФл°ЬкЈЄ','нКЄлЮШлЄФмЫФл†Ы'];
  var cards=(store.payOk||[]).filter(function(c){return c!=='мєілУЬк∞АлК•'&&c!=='нШДкЄИк∞АлК•'&&c!=='л™®л•ік≤†мЦімЪФ';});
  cards.sort(function(a,b){var ai=cardOrder.indexOf(a),bi=cardOrder.indexOf(b);return(ai<0?99:ai)-(bi<0?99:bi);});
  var pills=cards.map(function(c){return'<span class="dpill" style="background:'+cardColor(c)+';color:#fff">'+c+'</span>';}).join('');

  var mapHtml='';
  if(store.lat&&store.lng){
    var mapUrl='https://www.google.com/maps/search/?api=1&query='+store.lat+','+store.lng;
    mapHtml='<div style="width:100%;height:110px;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:12px;cursor:pointer" onclick="window.open(\''+mapUrl+'\',\'_blank\')">'
      +'<div id="dp-gmap" style="width:100%;height:100%"></div></div>';
  }

  document.getElementById('dp-scroll').innerHTML=
    '<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#2563eb;margin-bottom:5px">к≤∞м†Ь к∞АлК•</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px">'+pills+'</div></div>'
    +(store.address?'<div style="font-size:11px;color:#777;margin-bottom:8px">'+store.address+'</div>':'')
    +mapHtml;

  if(store.lat&&store.lng&&typeof google!=='undefined'){
    setTimeout(function(){
      var el=document.getElementById('dp-gmap');if(!el)return;
      var map=new google.maps.Map(el,{center:{lat:store.lat,lng:store.lng},zoom:16,disableDefaultUI:true,gestureHandling:'none'});
      new google.maps.Marker({position:{lat:store.lat,lng:store.lng},map:map,title:store.name});
    },150);
  }
}
function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}
function toggleDpZzim(){
  var id = window._currentStoreId;
  if(!id) return;
  removeZzim(id);
  closeDetail();
}
function goToDetail(){
  var id=window._currentStoreId;
  window.location.href='heka_store_detail.html'+(id?'?id='+id:'');
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

window.addEventListener('DOMContentLoaded', renderZzimList);
</script>
</body>
</html>
